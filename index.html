<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的清单</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Todo清单">
<meta name="theme-color" content="#4caf82">
<link rel="manifest" id="manifestLink">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--white:#fff;--border:#e0e3e8;--border2:#c9cdd4;
  --text:#1f2329;--text2:#646a73;--text3:#9fa8b5;
  --accent:#4caf82;--accent2:#3d9970;
  --row-hover:#f7f8fa;--header-bg:#f0f2f5;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── Topbar ── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:300;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.title-wrap{display:flex;align-items:center;gap:6px;min-width:0}
.title-display{font-size:17px;font-weight:700;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;padding:3px 6px;border-radius:5px}
.title-display:hover{background:var(--header-bg)}
.title-input{font-size:17px;font-weight:700;border:1.5px solid var(--accent);border-radius:6px;padding:3px 8px;outline:none;width:220px;display:none}
.spacer{flex:1}
.chip{background:#eaf7f0;color:var(--accent2);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.tb-btn{background:var(--header-bg);color:var(--text2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s}
.tb-btn:hover{background:var(--border2);color:var(--text)}
.tb-btn.active{background:#eaf7f0;color:var(--accent);border-color:var(--accent)}
.tb-btn.green{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.green:hover{background:var(--accent2)}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}

/* ── Panels ── */
.panel-area{padding:10px 18px 0}
.panel{background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;animation:fadeIn .12s ease}
.panel-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.panel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1}
.panel-close:hover{color:var(--text)}

/* Group panel */
.group-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.group-row{display:flex;align-items:center;gap:6px;background:var(--header-bg);border-radius:7px;padding:5px 10px}
.group-lbl{font-size:12px;color:var(--text3);min-width:28px}
.group-sel{flex:1;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text);outline:none;background:#fff}
.group-sel:focus{border-color:var(--accent)}
.group-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:1px 4px;border-radius:4px}
.group-del:hover{color:#e35454;background:#fff0f0}
.panel-link{font-size:13px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0}
.panel-link:hover{text-decoration:underline}
.panel-link.danger{color:var(--text3);margin-left:auto}
.panel-link.danger:hover{color:#e35454}

/* Filter panel */
.filter-row{display:flex;align-items:center;gap:6px;background:var(--header-bg);border-radius:7px;padding:5px 10px;margin-bottom:6px}
.filter-sel{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text);outline:none;background:#fff;flex:1}
.filter-sel:focus{border-color:var(--accent)}
.filter-inp{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text);outline:none;background:#fff;flex:1.5}
.filter-inp:focus{border-color:var(--accent)}

/* Sort panel */
.sort-row{display:flex;align-items:center;gap:6px;background:var(--header-bg);border-radius:7px;padding:5px 10px;margin-bottom:6px}

/* ── Table wrapper ── */
.wrapper{padding:12px 18px 80px;overflow-x:auto}
.table-wrap{background:var(--white);border-radius:12px;border:1px solid #e5e7eb;box-shadow:none;overflow:hidden}
.grid-table{width:100%;border-collapse:collapse;font-size:14px;color:#1f2329}

/* Head */
.grid-table thead tr{background:#f7f8fa}
.grid-table thead th{padding:0;border-right:1px solid #e4e6ea;border-bottom:1.5px solid #e4e6ea;position:relative;user-select:none;height:40px}
.grid-table thead th:last-child{border-right:none}
.th-inner{display:flex;align-items:center;padding:0 12px;gap:5px;font-size:13px;font-weight:500;color:#646a73;min-height:40px;cursor:default}
.th-drag-handle{cursor:col-resize;color:var(--text3);font-size:13px;padding:0 2px;opacity:0;transition:opacity .15s}
th:hover .th-drag-handle{opacity:1}
.th-menu-btn{opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;line-height:1;margin-left:auto;flex-shrink:0}
th:hover .th-menu-btn{opacity:1}
.th-menu-btn:hover{color:var(--text)}
.th-type-icon{font-size:13px;opacity:.7;flex-shrink:0}
.th-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.th-sort-icon{font-size:11px;color:var(--accent);flex-shrink:0}
.col-check{width:40px;text-align:center}
.col-num{width:44px;text-align:center}
.th-drag-over-left{border-left:2px solid var(--accent) !important}
.th-drag-over-right{border-right:2px solid var(--accent) !important}

/* Body */
.grid-table tbody tr{border-bottom:1px solid #f0f1f3;transition:background .1s}
.grid-table tbody tr:last-child{border-bottom:none}
.grid-table tbody tr:hover{background:#f5f7fa}
.grid-table tbody tr.row-done{}
.grid-table tbody tr.row-done td .cell-text-wrap,
.grid-table tbody tr.row-done td .cell-text-view{text-decoration:line-through;color:#c0c4cc}
.grid-table tbody tr.row-drag-over{box-shadow:inset 0 2px 0 var(--accent)}
.grid-table tbody tr.row-dragging{opacity:.4}
.grid-table tbody td{padding:0;border-right:1px solid #f0f1f3;vertical-align:middle;position:relative;height:40px}
.grid-table tbody td:last-child{border-right:none}
.check-cell{width:48px;text-align:center;padding:0;vertical-align:middle !important}
.num-cell{text-align:center;color:#9fa8b5;font-size:12px;padding:0 4px;vertical-align:middle !important;cursor:grab}
.num-cell:active{cursor:grabbing}
.row-drag-handle{opacity:0;color:#9fa8b5;font-size:13px}
tr:hover .row-drag-handle{opacity:1}
.custom-check{width:16px;height:16px;border:2px solid #c9cdd4;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:#fff;flex-shrink:0}
.custom-check.checked{background:var(--accent);border-color:var(--accent)}
.custom-check.checked::after{content:'';width:3px;height:6px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}

/* Indent */
.indent-wrap{display:flex;align-items:center;height:40px}
.indent-spacer{flex-shrink:0}
.toggle-btn{background:none;border:none;cursor:pointer;color:#9fa8b5;font-size:11px;padding:0 4px 0 0;line-height:1;flex-shrink:0;transition:color .1s}
.toggle-btn.no-children{opacity:0;pointer-events:none}
.toggle-btn:hover{color:#646a73}
.cell-inner{flex:1;min-width:0}
.add-child-btn{display:none;background:none;border:none;cursor:pointer;color:#9fa8b5;font-size:11px;padding:2px 5px;border-radius:4px}
tr:hover .add-child-btn{display:inline-flex;align-items:center;gap:3px}
.add-child-btn:hover{color:var(--accent);background:#eaf7f0}

/* Text cell */
.cell-text-wrap{padding:0 12px;min-height:40px;display:flex;align-items:center;cursor:text}
.cell-text-view{font-size:14px;color:#1f2329;line-height:1.5;word-break:break-all;white-space:pre-wrap}
.cell-text-view.clamped{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal}
.cell-expand-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 0;display:block;margin-top:2px}
.cell-expand-btn:hover{text-decoration:underline}
.cell-edit-ta{display:none;width:100%;border:none;outline:none;background:transparent;font-size:14px;color:#1f2329;resize:none;overflow:hidden;line-height:1.5;min-height:20px;padding:8px 12px;font-family:inherit}
.cell-text-wrap.editing .cell-text-view,.cell-text-wrap.editing .cell-expand-btn{display:none}
.cell-text-wrap.editing .cell-edit-ta{display:block}
td.cell-focus{box-shadow:inset 0 0 0 2px #366ef4;background:#f5f7fa !important}

/* Select cell */
.cell-select-wrap{padding:4px 12px;min-height:40px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;cursor:pointer}
.tag-pill{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;padding:2px 8px;border-radius:100px;white-space:nowrap}
.tag-rm{cursor:pointer;opacity:.5;font-size:11px;line-height:1}
.tag-rm:hover{opacity:1}
.cell-add-hint{color:#9fa8b5;font-size:16px;line-height:1}

/* URL cell */
.cell-url-wrap{padding:6px 10px;min-height:38px;display:flex;flex-direction:column;gap:4px}
.url-row{display:flex;align-items:center;gap:6px}
.url-link{font-size:13px;color:#2563eb;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.url-link:hover{text-decoration:underline}
.url-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;opacity:0;flex-shrink:0}
td:hover .url-rm,.url-row:hover .url-rm{opacity:1}
.url-rm:hover{color:#e35454}
.url-add-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:1px 0;display:none}
td:hover .url-add-btn{display:block}
.url-add-btn:hover{text-decoration:underline}

/* Date */
.cell-date{width:100%;border:none;outline:none;background:transparent;font-size:14px;color:#1f2329;padding:0 12px;cursor:pointer;height:40px;display:block}
.cell-date::-webkit-calendar-picker-indicator{display:none}

/* Number */
.cell-num-wrap{padding:0 12px;height:40px;cursor:text;display:flex;align-items:center;justify-content:flex-end;font-size:14px;color:#1f2329}

/* Checkbox col type */
.cell-bool-wrap{padding:0 12px;height:40px;display:flex;align-items:center}

/* Row actions */
.row-actions{position:absolute;right:6px;top:4px;display:none;gap:2px;background:#fff;border:1px solid #e4e6ea;border-radius:6px;padding:2px 3px;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:20}
tr:hover .row-actions{display:flex}
.row-act{background:none;border:none;cursor:pointer;color:#9fa8b5;font-size:13px;padding:2px 5px;border-radius:4px;transition:all .1s}
.row-act:hover{color:#646a73;background:#f5f7fa}
.row-act.del:hover{color:#e35454;background:#fff0f0}

/* Add row */
.add-row-tr td{padding:0;border-right:none !important;border-bottom:none !important}
.add-row-btn{display:flex;align-items:center;gap:7px;padding:10px 16px;color:#646a73;font-size:13px;cursor:pointer;transition:color .15s,background .15s;width:100%;background:none;border:none;text-align:left;border-top:1px dashed #e4e6ea}
.add-row-btn:hover{color:var(--accent);background:#f5f7fa}
.add-col-th{background:#f7f8fa;border-left:1px solid #e4e6ea;width:46px !important;min-width:46px}
.add-col-btn{width:100%;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:#9fa8b5;font-size:20px}
.add-col-btn:hover{color:var(--accent)}

/* Group header */
.group-hdr-tr td{padding:0;background:#f7f8fa;border-bottom:1px solid #f0f1f3}
.group-hdr-inner{display:flex;align-items:center;gap:10px;padding:7px 14px;font-size:13px;font-weight:500;color:#646a73;cursor:pointer;user-select:none}
.group-hdr-inner:hover{color:#1f2329}
.gtoggle{font-size:11px;transition:transform .2s;display:inline-block;color:#9fa8b5}
.gtoggle.col{transform:rotate(-90deg)}
.gbadge{font-size:12px;font-weight:500;padding:2px 10px;border-radius:100px;background:#dee0e3;color:#1f2329}
.gcnt{font-size:12px;color:#9fa8b5;font-weight:400}
.gdone{font-size:11px;background:#eaf7f0;padding:2px 8px;border-radius:100px;color:var(--accent2);font-weight:500}

/* Popover */
.popover-mask{position:fixed;inset:0;z-index:999}
.popover{position:fixed;z-index:1000;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:220px;overflow:hidden;animation:fadeIn .12s ease;max-height:80vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── 跨表联动底部条 ── */
#clBar { position:fixed; bottom:-200px; left:0; right:0; height:180px; background:#fff; border-top:2px solid var(--accent); box-shadow:0 -4px 24px rgba(0,0,0,.12); z-index:500; display:flex; flex-direction:column; transition:bottom .25s cubic-bezier(.32,.72,0,1); }
#clBar.open { bottom:0; }
body.dark-mode #clBar { background:#1a1e2a; border-color:var(--accent); }
.cl-bar-header { display:flex; align-items:center; gap:10px; padding:8px 16px 6px; border-bottom:1px solid var(--border); flex-shrink:0; }
.cl-bar-source { font-size:13px; font-weight:600; color:var(--text); background:var(--header-bg); padding:3px 10px; border-radius:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px; }
.cl-bar-arrow { color:var(--accent); font-size:16px; flex-shrink:0; }
.cl-bar-hint { font-size:12px; color:var(--text2); flex:1; }
.cl-bar-close { background:none; border:none; cursor:pointer; color:var(--text3); font-size:18px; padding:0 4px; margin-left:auto; flex-shrink:0; }
.cl-bar-close:hover { color:var(--text); }
.cl-bar-body { display:flex; flex:1; overflow:hidden; }
.cl-bar-boards { width:160px; flex-shrink:0; border-right:1px solid var(--border); overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:4px; }
.cl-bar-board-btn { display:flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid var(--border); border-radius:8px; background:var(--header-bg); cursor:pointer; font-size:12px; color:var(--text); transition:all .15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cl-bar-board-btn:hover, .cl-bar-board-btn.sel { border-color:var(--accent); background:#eaf7f0; color:var(--accent2); font-weight:600; }
body.dark-mode .cl-bar-board-btn { background:#1e2334; }
body.dark-mode .cl-bar-board-btn.sel { background:#1e3a2f; }
.cl-bar-rows { flex:1; overflow-x:auto; overflow-y:hidden; display:flex; align-items:center; gap:8px; padding:0 14px; }
.cl-bar-chip { flex-shrink:0; font-size:13px; border:1.5px solid var(--border); border-radius:8px; padding:6px 14px; background:#fff; cursor:pointer; color:var(--text); transition:all .15s; white-space:nowrap; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
.cl-bar-chip:hover { border-color:var(--accent); background:#eaf7f0; box-shadow:0 2px 8px rgba(76,175,130,.2); }
.cl-bar-chip.linked { border-color:var(--accent); color:var(--accent); background:#eaf7f0; }
.cl-bar-chip.done-chip { opacity:.45; text-decoration:line-through; }
.cl-bar-empty { font-size:13px; color:var(--text3); padding:0 8px; }
body.dark-mode .cl-bar-chip { background:#1e2334; }
/* 底部条打开时，表格区域上移避免被遮挡 */
body.cl-bar-open .wrapper { padding-bottom:200px; }
body.cl-bar-open .mobile-view { padding-bottom:200px; }

/* ── Safe areas (iPhone notch/home bar) ── */
body{padding-bottom:env(safe-area-inset-bottom,0px)}
.topbar{padding-top:env(safe-area-inset-top,0px);height:calc(54px + env(safe-area-inset-top,0px))}

/* ── Mobile card view ── */
.mobile-view{display:none;padding:10px 12px 100px}
.mobile-search{display:none;padding:8px 12px;background:#fff;border-bottom:1px solid var(--border)}
.mobile-search input{width:100%;border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:15px;outline:none;background:var(--header-bg);-webkit-appearance:none}
.mobile-search input:focus{border-color:var(--accent);background:#fff}
.tb-btn-more{display:none !important}

@media(max-width:768px){
  .wrapper{display:none !important}
  .mobile-view{display:block}
  .mobile-search{display:block}
  .stats-bar{padding:8px 12px;gap:10px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .panel-area{padding:8px 12px 0}
  .topbar{padding-left:12px;padding-right:12px;gap:6px;flex-wrap:nowrap}
  .title-display{max-width:130px;font-size:15px}
  .tb-btn-desktop{display:none !important}
  .tb-btn-more{display:flex !important}
  .chip{font-size:11px;padding:2px 8px}
}

/* ── Cards ── */
.m-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:13px 14px;margin-bottom:8px;transition:opacity .2s;position:relative}
.m-card.done{opacity:.5}
.m-card.child{margin-left:18px;border-left:3px solid var(--accent);border-radius:0 12px 12px 0}
.m-card-top{display:flex;align-items:flex-start;gap:10px}
.m-card-check{flex-shrink:0;margin-top:2px}
.m-card-title{flex:1;font-size:15px;font-weight:500;line-height:1.45;color:#1f2329;word-break:break-all}
.m-card-title.struck{text-decoration:line-through;color:#c0c4cc}
.m-toggle{background:none;border:none;color:#9fa8b5;font-size:11px;cursor:pointer;padding:2px 4px;flex-shrink:0;margin-top:1px}
.m-card-body{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.m-field{display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:12px}
.m-field-lbl{color:#9fa8b5;flex-shrink:0;margin-right:2px}
.m-card-footer{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid #f0f1f3}
.m-card-num{font-size:11px;color:#9fa8b5;margin-right:auto}
.m-btn{background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:12px;color:#646a73;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s}
.m-btn:active{background:#f5f7fa}
.m-btn.del:active{color:#e35454;border-color:#e35454}
.m-grp-hdr{font-size:13px;font-weight:600;color:#646a73;padding:12px 4px 6px;display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.m-gcnt{font-size:11px;background:#f5f7fa;padding:2px 8px;border-radius:100px;color:#9fa8b5}
.m-gdone{font-size:11px;background:#eaf7f0;padding:2px 8px;border-radius:100px;color:var(--accent2)}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(76,175,130,.5);display:none;align-items:center;justify-content:center;z-index:500;-webkit-tap-highlight-color:transparent;transition:transform .12s}
.fab:active{transform:scale(.91)}
@media(max-width:768px){.fab{display:flex}}

/* ── Bottom sheet ── */
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:700;display:none;opacity:0;transition:opacity .25s}
.sheet-mask.show{opacity:1}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.13);z-index:800;transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px);max-height:75vh;overflow-y:auto}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 6px}
.sheet-title{font-size:15px;font-weight:700;padding:4px 18px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.sheet-item{display:flex;align-items:center;gap:13px;padding:15px 18px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);-webkit-tap-highlight-color:transparent}
.sheet-item:active{background:var(--header-bg)}
.sheet-item.on{color:var(--accent);font-weight:600}
.sheet-icon{font-size:18px;width:24px;text-align:center}


/* ═══ COLUMN / ROW RESIZE ═══ */
.col-resizer {
  position:absolute; right:-2px; top:0; bottom:0; width:8px;
  cursor:col-resize; z-index:20; background:transparent;
}
.col-resizer::after {
  content:''; position:absolute; right:3px; top:20%; bottom:20%; width:2px;
  background:transparent; border-radius:2px; transition:background .15s;
}
.col-resizer:hover::after, .col-resizer.active::after { background:var(--accent); }
.row-resizer {
  position:absolute; left:0; right:0; bottom:-2px; height:8px;
  cursor:row-resize; z-index:20; background:transparent;
}
.row-resizer::after {
  content:''; position:absolute; bottom:3px; left:10%; right:10%; height:2px;
  background:transparent; border-radius:2px; transition:background .15s;
}
.row-resizer:hover::after, .row-resizer.active::after { background:var(--accent); }
/* ensure td is positioned for row-resizer */
.grid-table tbody td { position:relative; }
body.resizing-col * { cursor:col-resize !important; user-select:none !important; }
body.resizing-row * { cursor:row-resize !important; user-select:none !important; }

/* ═══ BATCH BAR ═══ */
.batch-act{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;transition:background .15s}
.batch-act:hover{background:rgba(255,255,255,.22)}
.batch-act.danger{background:rgba(227,84,84,.25)}
.batch-act.danger:hover{background:rgba(227,84,84,.45)}
.batch-act.cancel{background:transparent;color:rgba(255,255,255,.5)}
.batch-act.cancel:hover{color:#fff;background:rgba(255,255,255,.1)}
/* select mode row checkbox */
.row-sel-cb{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
tr.row-selected td{background:rgba(76,175,130,.07) !important}

/* ── Dark mode ── */
body.dark-mode{
  --bg:#0f1117;--white:#1a1e2a;--border:#2a2f3d;--border2:#363c4d;
  --text:#e2e6f0;--text2:#8b94a8;--text3:#555e72;
  --header-bg:#161b27;--row-hover:#1e2334;--accent:#4caf82;
  --shadow:0 2px 16px rgba(0,0,0,.5);
  background:#0f1117;
}
/* stars handled via JS #starsBg element */
/* homepage card dark fix */
body.dark-mode .board-card{background:var(--white);border-color:var(--border);color:var(--text)}
body.dark-mode .board-card-title{color:var(--text)}
body.dark-mode .board-card-meta{color:var(--text2)}
body.dark-mode .board-card-time{color:var(--text3)}
body.dark-mode .hp-bar{background:var(--white);border-color:var(--border)}
body.dark-mode .hp-title{color:var(--text)}
/* table cell text fix */
body.dark-mode td{color:var(--text)}
body.dark-mode th{color:var(--text2);background:var(--header-bg)}
body.dark-mode .cell-text{color:var(--text);background:transparent}

body.dark-mode .topbar{background:var(--white);border-color:var(--border)}
body.dark-mode .title-display{color:var(--text)}
body.dark-mode .stats-bar{background:var(--white);border-color:var(--border);color:var(--text2)}
body.dark-mode .panel{background:var(--white);border-color:var(--border)}
body.dark-mode .panel-title{color:var(--text)}
body.dark-mode .group-sel,.form-select{background:var(--white);color:var(--text);border-color:var(--border)}
body.dark-mode .modal-box{background:var(--white);color:var(--text)}
body.dark-mode .modal-title{color:var(--text)}
body.dark-mode .popover{background:var(--white);border-color:var(--border)}
body.dark-mode .pop-item{color:var(--text)}

body.dark-mode .chip{background:#1e3a2f;color:#4caf82}
body.dark-mode .tb-btn{background:var(--header-bg);color:var(--text2);border-color:var(--border)}
body.dark-mode .tb-btn:hover{background:var(--row-hover);color:var(--text)}
body.dark-mode .tb-btn.active{background:#1e3a2f;color:var(--accent);border-color:var(--accent)}
body.dark-mode .row-actions{background:var(--white);border-color:var(--border)}
body.dark-mode .grp-hdr-row td{background:#161b27 !important}
/* ── DARK MODE: nuclear override for ALL table content ── */
body.dark-mode table { color:#e2e6f0 !important; }
body.dark-mode table * { color:#e2e6f0 !important; }
/* then restore tags AFTER — higher specificity wins */
body.dark-mode table .tag-pill,
body.dark-mode table .tag-pill span { color:unset !important; background:unset !important; }
body.dark-mode tr td { background:#1a1e2a !important; }
body.dark-mode tr:hover td { background:#1e2334 !important; }
body.dark-mode tr.row-done td { background:#1a1e2a !important; opacity:.55; }
body.dark-mode tr.row-selected td { background:rgba(76,175,130,.18) !important; }
body.dark-mode .add-row-tr td { background:transparent !important; }
/* tags — keep inline style colors intact, only exempt from color override */
body.dark-mode .tag-pill { color:unset !important; background:unset !important; }
body.dark-mode .tag-pill * { color:unset !important; }
/* table borders → subtle dark lines */
body.dark-mode .grid-table tbody td { border-right-color:#2a2f3d !important; }
body.dark-mode .grid-table tbody tr { border-bottom-color:#2a2f3d !important; }
body.dark-mode .grid-table thead th { border-right-color:#2a2f3d !important; border-bottom-color:#363c4d !important; }
body.dark-mode .table-wrap { border-color:#2a2f3d !important; }
/* textarea + input inside cells */
body.dark-mode td textarea,
body.dark-mode td input { background:#252a36 !important; color:#e2e6f0 !important; border-color:#363c4d !important; }
/* group header rows */
body.dark-mode .grp-hdr-row td { background:#161b27 !important; color:#8b94a8 !important; }
body.dark-mode .grp-hdr-row td * { color:#8b94a8 !important; }
/* row actions icons */
body.dark-mode .row-act { color:#555e72 !important; }
body.dark-mode .row-act:hover { color:#e2e6f0 !important; background:#2a2f3d !important; }
body.dark-mode .row-actions { background:#1f2535 !important; border-color:#363c4d !important; }
body.dark-mode .ctx-menu{background:var(--white);border-color:var(--border)}
body.dark-mode .ctx-menu-item{color:var(--text)}
body.dark-mode .ctx-menu-item:hover{background:var(--row-hover)}
body.dark-mode .hp-modal,.pass-modal{background:var(--white)}
body.dark-mode .hp-modal h3{color:var(--text)}
body.dark-mode .hp-form-row label{color:var(--text2)}
body.dark-mode .hp-form-row input{background:var(--header-bg);color:var(--text);border-color:var(--border)}
/* cell text dark fix — covers all inline text including contenteditable */
body.dark-mode .cell-text,
body.dark-mode textarea,
body.dark-mode input[type=text],
body.dark-mode input[type=date],
body.dark-mode input[type=number],
body.dark-mode input[type=password],
body.dark-mode select,
body.dark-mode .title-display,
body.dark-mode .title-input,
body.dark-mode .cell-expand-text,
body.dark-mode .stats-item { color:var(--text) !important; }
body.dark-mode textarea,
body.dark-mode input[type=text],
body.dark-mode input[type=date],
body.dark-mode input[type=number],
body.dark-mode input[type=password],
body.dark-mode select { background:var(--header-bg) !important; border-color:var(--border) !important; }

/* stars — separate element so it's never blocked */
#starsBg { display:none; }
body.dark-mode #starsBg {
  display:block;
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}

/* twinkle animation */
@keyframes twinkle{0%,100%{opacity:.9}50%{opacity:.2}}

.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle 2s ease-in-out infinite alternate; }

.star.t3 { animation-duration:3.5s; }

/* ── Kanban ── */
.kb-col{background:#f7f8fa;border-radius:12px;padding:10px;min-width:220px;max-width:260px}

.kb-card{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #f0f1f3;transition:box-shadow .15s}
.kb-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}

body.dark-mode .kb-col{background:#1f262f}
body.dark-mode .kb-col-title{color:#e8eaed}
body.dark-mode .kb-card{background:#252931;border-color:#363b45}
body.dark-mode .kb-card-title{color:#e8eaed}

/* ── Calendar ── */
.cal-header { display:flex; align-items:center; justify-content:center; gap:16px; padding:16px 20px 8px; }
.cal-title { font-size:17px; font-weight:700; color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border-radius:8px; overflow:hidden; margin:0 16px 16px; }
.cal-dow { background:var(--header-bg); text-align:center; padding:8px 4px; font-size:12px; font-weight:600; color:var(--text2); }
.cal-cell { background:var(--white); min-height:80px; padding:6px; position:relative; }
.cal-cell.cal-empty { background:var(--bg); }
.cal-cell.cal-today { box-shadow:inset 0 0 0 2px var(--accent); }
.cal-day-num { font-size:12px; font-weight:600; color:var(--text3); margin-bottom:4px; }
.cal-cell.cal-today .cal-day-num { color:var(--accent); font-weight:800; }
.cal-chip { font-size:11px; padding:2px 6px; border-radius:4px; background:var(--accent); color:#fff; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.9; }
.cal-chip:hover { opacity:1; }
.cal-chip.cal-chip-done { background:var(--text3); text-decoration:line-through; opacity:.6; }
.cal-more { font-size:10px; color:var(--text3); padding:1px 4px; }
body.dark-mode .cal-cell { background:var(--white); }
body.dark-mode .cal-dow { background:var(--header-bg); }
body.dark-mode #homeCalendar { background:var(--bg); border-color:var(--border); }
body.dark-mode #homeCalendar .cal-cell { background:var(--white); }
body.dark-mode #homeCalendar .cal-cell.cal-empty { background:var(--header-bg); }
body.dark-mode #homeCalendar .cal-cell.has-todos { background: linear-gradient(180deg, var(--white) 0%, #1a2f26 100%); }
body.dark-mode #homeCalendar .cal-cell.holiday { background: linear-gradient(180deg, #2a1f1f 0%, #1f1515 100%); }
body.dark-mode #homeCalendar .cal-cell.birthday { background: linear-gradient(180deg, #2a2615 0%, #1f1a0f 100%); }
body.dark-mode #homeCalendar .cal-cell.anniversary { background: linear-gradient(180deg, #1a252f 0%, #0f1a25 100%); }

/* ── Home Calendar ── */
.hp-section-title { display:flex; align-items:center; justify-content:space-between; padding:20px 18px 12px; margin-top:10px; }
.hp-section-title span { font-size:15px; font-weight:700; color:var(--text); }
.hp-section-btn { background:transparent; border:1px solid var(--border); border-radius:6px; padding:4px 12px; font-size:12px; color:var(--text2); cursor:pointer; }
.hp-section-btn:hover { background:var(--header-bg); color:var(--text); }
#homeCalendar { background:var(--white); border-top:1px solid var(--border); padding:0 0 20px; }
#homeCalendar .cal-header { justify-content:flex-start; gap:8px; padding:16px 18px 12px; }
#homeCalendar .cal-grid { margin:0 18px 12px; border-radius:12px; }
#homeCalendar .cal-cell { min-height:100px; cursor:pointer; transition:background .15s; display:flex; flex-direction:column; }
#homeCalendar .cal-cell:hover { background:var(--row-hover); }
#homeCalendar .cal-cell.has-todos { background: linear-gradient(180deg, var(--white) 0%, #f0faf7 100%); }
#homeCalendar .cal-cell.holiday { background: linear-gradient(180deg, #fff5f5 0%, #ffeeee 100%); }
#homeCalendar .cal-cell.holiday .cal-day-num { color:#e74c3c; font-weight:700; }
#homeCalendar .cal-cell.birthday { background: linear-gradient(180deg, #fff8e7 0%, #fef3d8 100%); }

#homeCalendar .cal-cell.custom-mark::before { content:attr(data-emoji); position:absolute; top:4px; right:4px; font-size:14px; }
/* Apple-style colored bars for todos */
.cal-todo-list { margin-top:6px; display:flex; flex-direction:column; gap:2px; }
.cal-todo-bar { font-size:10px; padding:3px 6px; border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; }
.cal-todo-bar::before { content:''; width:3px; height:100%; border-radius:2px; flex-shrink:0; }
.cal-todo-bar.done { opacity:.5; }

.cal-todo-bar.work { background:#f3e5f5; color:#7b1fa2; }

.cal-more { font-size:9px; color:#9e9e9e; padding-left:6px; margin-top:2px; }
.cal-dot-list { display:flex; gap:3px; flex-wrap:wrap; margin-top:2px; }
.cal-dot-item { width:6px; height:6px; border-radius:50%; }
.cal-legend { display:flex; gap:16px; padding:0 18px; flex-wrap:wrap; }
.cal-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }

.cdp-emoji-btn.active { background:#eaf7f0; border-color:#4caf82; }
body.dark-mode .cdp-emoji-btn.active { background:#1e3a2f; border-color:#4caf82; }
.cdp-note-input { width:calc(100% - 28px); margin:2px 14px 8px; border:1px solid #e5e7eb; border-radius:8px; padding:7px 10px; font-size:13px; outline:none; color:#1f2329; background:#fff; }
body.dark-mode .cdp-note-input { background:#1e2334; border-color:#2a2f3d; color:#e2e6f0; }

.cdp-footer { display:flex; align-items:center; justify-content:space-between; padding:8px 14px 12px; border-top:1px solid #f0f1f3; }
body.dark-mode .cdp-footer { border-color:#2a2f3d; }
.cdp-btn { border:none; border-radius:8px; padding:7px 16px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.cdp-btn-primary { background:#4caf82; color:#fff; }
.cdp-btn-primary:hover { background:#3d9970; }
.cdp-btn-danger { background:#fff0f0; color:#e35454; }
.cdp-btn-danger:hover { background:#ffe0e0; }
body.dark-mode .cdp-btn-danger { background:#2a1f1f; color:#e35454; }

/* ── 悬浮 tooltip ── */
.cal-day-tooltip { background:#1f2329; color:#e2e6f0; border-radius:10px; padding:10px 0; box-shadow:0 6px 24px rgba(0,0,0,.25); min-width:200px; max-width:260px; pointer-events:none; animation:fadeIn .1s ease; }
.cdt-holiday { font-size:12px; font-weight:700; color:#ff7675; padding:4px 14px 6px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:4px; }
.cdt-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 14px; font-size:12px; overflow:hidden; }
.cdt-row span:first-child { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cdt-done { text-decoration:line-through; opacity:.5; }
.cdt-board { font-size:10px; flex-shrink:0; opacity:.7; }

/* ── Stats Panel ── */
.stats-panel-inner { padding:20px; }
.stats-panel-hdr { display:flex; justify-content:space-between; align-items:center; font-size:16px; font-weight:700; color:var(--text); margin-bottom:20px; }
.stats-summary { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:20px; }
.stats-card { background:var(--header-bg); border-radius:10px; padding:14px 12px; text-align:center; }
.stats-num { font-size:26px; font-weight:800; color:var(--text); }
.stats-lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.stats-sec-title { font-size:13px; font-weight:700; color:var(--text2); margin:16px 0 8px; }
.heat-grid { display:grid; grid-template-columns:repeat(13,1fr); gap:3px; margin-bottom:8px; }
.heat-cell { aspect-ratio:1; border-radius:2px; }
.heat-0 { background:var(--border); }
.heat-1 { background:#b7dfcc; }
.heat-2 { background:#5dbf91; }
.heat-3 { background:#3aaa78; }
.heat-4 { background:#1d7a52; }
.stats-bars { display:flex; flex-direction:column; gap:6px; }
.stats-bar-row { display:flex; align-items:center; gap:8px; font-size:12px; }
.stats-bar-lbl { width:70px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
.stats-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.stats-bar-fill { height:100%; background:var(--accent); border-radius:4px; }
.stats-bar-cnt { width:24px; text-align:right; color:var(--text3); flex-shrink:0; }

/* ── Timeline ── */
.tl-wrap { display:flex; overflow-x:auto; padding:16px; min-height:calc(100vh - 120px); }
.tl-labels { flex-shrink:0; width:140px; border-right:1px solid var(--border); }
.tl-lbl-hdr { height:40px; display:flex; align-items:center; font-size:12px; font-weight:600; color:var(--text3); padding:0 8px; border-bottom:1px solid var(--border); }
.tl-lbl { height:36px; display:flex; align-items:center; font-size:12px; color:var(--text); padding:0 8px; border-bottom:1px solid var(--border); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tl-lbl.tl-done { opacity:.5; text-decoration:line-through; }
.tl-grid-wrap { flex:1; overflow-x:auto; }
.tl-dates { display:flex; border-bottom:1px solid var(--border); }
.tl-date-cell { min-width:36px; height:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:var(--text3); border-right:1px solid var(--border); flex-shrink:0; }
.tl-weekend { background:var(--bg); }
.tl-today-col { color:var(--accent); font-weight:800; }
.tl-row-cells { display:flex; }
.tl-cell { min-width:36px; height:36px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); flex-shrink:0; }
.tl-bar { background:rgba(76,175,130,.25); }
.tl-bar-end { background:var(--accent) !important; border-radius:0 4px 4px 0; }
.tl-overdue .tl-bar { background:rgba(244,67,54,.15) !important; }
.tl-overdue .tl-bar-end { background:#f44336 !important; }
.tl-done-row .tl-bar, .tl-done-row .tl-bar-end { background:var(--border) !important; opacity:.5; }

/* ── Priority Matrix ── */
.matrix-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; height:calc(100vh - 120px); box-sizing:border-box; }
.matrix-quadrant { border-radius:12px; border:2px solid; padding:12px; overflow-y:auto; }
.matrix-q-title { font-size:13px; font-weight:700; margin-bottom:2px; }
.matrix-q-count { font-size:11px; color:var(--text3); margin-bottom:8px; }
.matrix-card { background:var(--white); border-radius:8px; padding:8px 10px; margin-bottom:6px; font-size:12px; color:var(--text); cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.06); border:1px solid var(--border); transition:transform .1s; }
.matrix-card:hover { transform:translateY(-1px); }
body.dark-mode .matrix-card { background:var(--white); }

/* ── Deadline badges ── */
.cell-date-badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:100px;margin-top:2px;font-weight:500}

/* ── Topbar btn icon ── */
.tb-btn.btn-icon{padding:5px 9px}

/* ═══ HOMEPAGE ═══ */
#homePage { display:flex; flex-direction:column; min-height:100vh; }
/* #boardPage display controlled by JS class .bp-visible */
#boardPage:not(.bp-visible) { display:none !important; }
#boardPage.bp-visible { display:block; }
.hp-bar { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 20px; height:54px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:300; box-shadow:0 1px 6px rgba(0,0,0,.04); }
.hp-title { font-size:18px; font-weight:700; color:#1f2329; }
.hp-new-btn { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:background .15s; }
.hp-new-btn:hover { background:var(--accent2); }
.hp-body { padding:20px; max-width:1100px; margin:0 auto; width:100%; }
.hp-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-top:8px; }
@media(min-width:640px){ .hp-grid { grid-template-columns:repeat(3,1fr); } }
@media(min-width:960px){ .hp-grid { grid-template-columns:repeat(4,1fr); } }
.board-card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:18px; cursor:pointer; transition:all .15s; box-shadow:0 1px 2px rgba(0,0,0,.04); position:relative; min-height:130px; overflow:hidden; }
.board-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); transform:translateY(-1px); border-color:#d0d4dc; }
.board-card-progress { position:absolute; bottom:0; left:0; right:0; height:4px; background:#f0f1f3; }
.board-card-progress-bar { height:100%; background:var(--accent); border-radius:0 2px 2px 0; transition:width .3s ease; }
.board-card-emoji { font-size:30px; margin-bottom:8px; line-height:1; }
.board-card-title { font-size:15px; font-weight:600; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#1f2329; }
.board-card-meta { font-size:12px; color:#646a73; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.vis-badge { font-size:11px; padding:2px 8px; border-radius:100px; font-weight:500; }
.vis-badge.public { background:#eaf7f0; color:#2d7a4f; }
.vis-badge.private { background:#fff0f0; color:#c0476e; }
.board-card-time { font-size:11px; color:#9fa8b5; margin-top:8px; }
.board-card-menu-btn { position:absolute; top:10px; right:10px; background:transparent; border:none; cursor:pointer; font-size:18px; color:#9fa8b5; width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
.board-card:hover .board-card-menu-btn { opacity:1; }
.board-card-menu-btn:hover { background:#f5f7fa; color:#646a73; }
.hp-empty { text-align:center; padding:60px 20px; color:#9fa8b5; }
.hp-empty-icon { font-size:48px; margin-bottom:12px; }

/* ═══ HOMEPAGE MODAL ═══ */
.hp-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:600; padding:20px; }
.hp-modal { background:#fff; border-radius:16px; max-width:400px; width:100%; padding:24px; box-shadow:0 8px 40px rgba(0,0,0,.2); }
.hp-modal h3 { font-size:17px; font-weight:700; margin-bottom:18px; }
.hp-form-row { margin-bottom:14px; }
.hp-form-row label { display:block; font-size:13px; font-weight:500; color:var(--text2); margin-bottom:5px; }
.hp-form-row input[type=text], .hp-form-row input[type=password] { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; }
.hp-form-row input:focus { border-color:var(--accent); }
.emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; max-height:140px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; padding:6px; }
.emoji-opt { width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; border-radius:6px; }
.emoji-opt:hover,.emoji-opt.sel { background:var(--header-bg); }
.vis-toggle-row { display:flex; align-items:center; gap:10px; }
.vis-toggle-lbl { font-size:13px; color:var(--text2); }
.toggle-sw { width:42px; height:24px; background:var(--border2); border-radius:12px; position:relative; cursor:pointer; transition:background .2s; }
.toggle-sw.on { background:var(--accent); }
.toggle-sw::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.toggle-sw.on::after { transform:translateX(18px); }
.hp-modal-btns { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
.hp-modal-btns button { padding:9px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
.hp-btn-cancel { background:var(--header-bg); color:var(--text); }
.hp-btn-ok { background:var(--accent); color:#fff; }
.hp-btn-ok:hover { background:var(--accent2); }

/* ═══ SYNC BADGE ═══ */
.sync-badge { font-size:12px; padding:2px 10px; border-radius:20px; white-space:nowrap; }
.sync-ok { background:#eaf7f0; color:#2d7a4f; }
.sync-ing { background:#fff8e1; color:#c57c00; }
.sync-off { background:#fff0f0; color:#c0476e; }

/* ═══ DROPDOWN MENU ═══ */
.ctx-menu { position:fixed; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,.15); z-index:700; padding:6px 0; min-width:160px; }
.ctx-menu-item { padding:9px 16px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--text); }
.ctx-menu-item:hover { background:var(--header-bg); }
.ctx-menu-item.danger { color:var(--danger,#e53935); }

/* ═══ PASS MODAL ═══ */
.pass-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:800; }
.pass-modal { background:#fff; border-radius:16px; padding:28px; max-width:340px; width:90%; text-align:center; }
.pass-modal h3 { font-size:17px; font-weight:700; margin-bottom:8px; }
.pass-modal p { font-size:13px; color:var(--text2); margin-bottom:18px; }
.pass-modal input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:15px; letter-spacing:3px; outline:none; text-align:center; }

.pass-modal-btns { display:flex; gap:10px; margin-top:16px; }
.pass-modal-btns button { flex:1; padding:10px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }

</style>

<body>

<!-- Stars background (dark mode) -->
<div id="starsBg"></div>

<!-- ═══════ HOME PAGE ═══════ -->
<div id="homePage">
  <div class="hp-bar">
    <span class="hp-title">📋 我的清单</span>
    <div style="flex:1"></div>
    <button class="tb-btn btn-icon" id="darkModeBtnHome" onclick="toggleDarkMode()" title="深色模式" style="width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">🌙</button>
    <button class="tb-btn btn-icon" id="themeBtnHome" onclick="cycleTheme()" title="切换主题" style="width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;margin-left:10px">🎨</button>
    <button class="hp-new-btn" onclick="showCreateModal()" style="margin-left:8px">＋ 新建</button>
  </div>
  <div class="hp-body">

    <div class="hp-quote" id="dailyQuote"></div>
    
    <!-- 首页日历区域 -->
    <div class="hp-section-title">

        <span class="cal-legend-item"><span class="cal-dot" style="background:#4ecdc4"></span> 生日</span>
        <span class="cal-legend-item"><span class="cal-dot" style="background:#ffe66d"></span> 纪念日</span>
        <span class="cal-legend-item"><span class="cal-dot" style="background:#a8e6cf"></span> 自定义</span>

    </div>

</div>

<!-- ═══════ BOARD PAGE ═══════ -->
<div id="boardPage">
<!-- Topbar -->

    <span style="position:absolute;left:9px;color:var(--text3);font-size:13px;pointer-events:none">🔍</span>

  <button class="tb-btn green tb-btn-desktop" onclick="exportCSV()">⬇ 导出</button>

</div>

<!-- Mobile search -->
<div class="mobile-search">

/* ══════════════════════════════════════════════

const SUPABASE_URL = 'https://dbymgvfnydyunnxjsndh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0LvNrnUViQnaFfznZ1cCVw_K0RfNZ2P';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let homeBoards = [];

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}
function nowISO() { return new Date().toISOString(); }
function uid()    { return crypto.randomUUID ? crypto.randomUUID() : 'b'+Date.now()+Math.random().toString(36).slice(2); }

function setSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  if (state === 'ok')  { el.textContent='🟢 已同步'; el.className='sync-badge sync-ok'; }
  if (state === 'ing') { el.textContent='🟡 同步中'; el.className='sync-badge sync-ing'; }
  if (state === 'off') { el.textContent='🔴 离线';   el.className='sync-badge sync-off'; }
}

/* ─── Row format converters ─── */
function rowToDb(row, boardId, idx) {
  return {
    id: row.id,
    board_id: boardId,
    parent_id: row.p || null,
    done: !!row.done,
    collapsed: !!row.col,
    cells: row.cells || {},
    position: typeof idx === 'number' ? idx * 1000 : (row.pos || 0),
    visibility: row.visibility || 'public',
    sync_id: row.syncId || null,
    updated_at: nowISO()
  };
}
function rowFromDb(dbRow) {
  return {
    id: dbRow.id,
    p: dbRow.parent_id || null,
    done: !!dbRow.done,
    col: !!dbRow.collapsed,
    cells: dbRow.cells || {},
    pos: dbRow.position || 0,
    visibility: dbRow.visibility || 'public',
    syncId: dbRow.sync_id || null,
    _updatedAt: dbRow.updated_at || ''   // 用于 Realtime 冲突判断
  };
}

/* ─── Home boards ─── */
async function loadHomeBoards() {
  const cached = JSON.parse(localStorage.getItem('home_boards') || 'null');
  if (cached) homeBoards = cached;

  if (!isOnline) return;
  const { data, error } = await sb.from('boards').select('*').order('updated_at', { ascending: false });
  if (!error && data) {
    const remoteIds = new Set(data.map(b => b.id));
    const localOnly = homeBoards.filter(b => !remoteIds.has(b.id));
    homeBoards = [...localOnly, ...data];
    localStorage.setItem('home_boards', JSON.stringify(homeBoards));
    for (const b of localOnly) {
      try { await sb.from('boards').insert(b); } catch(e) {}
    }
  }
}

function saveHomeBoards() {
  localStorage.setItem('home_boards', JSON.stringify(homeBoards));
}

/* ─── Board cloud sync ─── */
async function syncBoardFromCloud(boardId) {
  if (!isOnline) return;
  const { data, error } = await sb.from('rows').select('*').eq('board_id', boardId).order('position');
  if (!error && data) {
    const remoteMap = new Map(data.map(r => [r.id, r]));
    const localOnly = S.rows.filter(r => !remoteMap.has(r.id));

    // 对已存在的行：只在云端更新时间 > 本地才采用云端版本（防止覆盖刚编辑的内容）
    const merged = data.map(remoteRow => {
      const localRow = S.rows.find(r => r.id === remoteRow.id);
      if (!localRow) return rowFromDb(remoteRow);
      const remoteTs = remoteRow.updated_at || '';
      const localTs  = localRow._updatedAt || '';
      return remoteTs > localTs ? { ...localRow, ...rowFromDb(remoteRow) } : localRow;
    });

    S.rows = [...merged, ...localOnly];
    save();
    // 把本地独有的行推上云
    for (const r of localOnly) {
      sb.from('rows').upsert(rowToDb(r, boardId, S.rows.indexOf(r))).then(() => {});
    }
    renderTable();
  }
}

let cloudSaveTimer = null;
function debouncedCloudSave() {
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async () => {
    if (!isOnline || !currentBoardId) return;
    setSyncBadge('ing');
    try {
      const pushTs = nowISO();
      const dbRows = S.rows.map((r, i) => rowToDb(r, currentBoardId, i));
      await sb.from('rows').upsert(dbRows);
      // 推送成功后把本地 _updatedAt 更新为推送时间，
      // 这样 Realtime 回来的事件时间戳一定 <= pushTs，不会再覆盖
      S.rows.forEach(r => { r._updatedAt = pushTs; });
      localStorage.setItem(STORE, JSON.stringify(S));
      const board = homeBoards.find(b => b.id === currentBoardId);
      if (board) {
        await sb.from('boards').update({
          columns: S.columns,
          title: S.title,
          sorts: S.sorts,
          filters: S.filters,
          group_by: S.groupBy,
          updated_at: nowISO()
        }).eq('id', currentBoardId);
        board.columns = S.columns;
        board.title = S.title;
        board.updated_at = nowISO();
        saveHomeBoards();
      }
      setSyncBadge('ok');
    } catch(e) {
      setSyncBadge('off');
    }
  }, 800);
}

/* ─── Realtime ─── */
let realtimeChannel = null;
function subscribeBoard(boardId) {
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  realtimeChannel = sb.channel('rows_' + boardId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rows', filter: 'board_id=eq.' + boardId }, payload => {
      if (payload.eventType === 'INSERT') {
        // 只有本地没有这条记录才插入（避免把刚本地新增的行误判为远端新增覆盖）
        if (!S.rows.find(r => r.id === payload.new.id)) {
          S.rows.push(rowFromDb(payload.new));
          save(); renderTable();
        }
      } else if (payload.eventType === 'UPDATE') {
        const idx = S.rows.findIndex(r => r.id === payload.new.id);
        if (idx >= 0) {
          const localRow = S.rows[idx];
          const remoteTs = payload.new.updated_at || '';
          const localTs  = localRow._updatedAt || '';
          // 只有云端更新时间 > 本地才合并，防止自己的 debounce 推送回来覆盖自己
          if (remoteTs > localTs) {
            S.rows[idx] = { ...localRow, ...rowFromDb(payload.new) };
            save(); renderTable();
          }
        }
      } else if (payload.eventType === 'DELETE') {
        S.rows = S.rows.filter(r => r.id !== payload.old.id);
        save(); renderTable();
      }
    })
    // Also subscribe to sync updates from OTHER boards (same sync_id, different board_id)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rows' }, payload => {
      if (payload.new.board_id === boardId) return; // already handled above
      const syncId = payload.new.sync_id;
      if (!syncId) return;
      // Find local rows with same syncId and apply the patch
      let changed = false;
      S.rows.forEach(row => {
        if (row.syncId === syncId) {
          if (payload.new.done !== undefined) row.done = payload.new.done;
          if (payload.new.cells) {
            // merge cells but skip url columns
            const urlColIds = new Set(S.columns.filter(c=>c.type==='url').map(c=>c.id));
            Object.entries(payload.new.cells).forEach(([k,v]) => {
              if (!urlColIds.has(k)) row.cells[k] = v;
            });
          }
          changed = true;
        }
      });
      if (changed) { save(); renderTable(); }
    })
    .subscribe();
}

/* ══════════════════════════════════════════════

function goHome() {
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }

async function openBoard(boardId, readOnly) {
  const board = homeBoards.find(b => b.id === boardId);
  if (!board) { alert('清单不存在'); goHome(); return; }

  // Password check
  if (board.visibility === 'private' && !readOnly) {
    const unlocked = JSON.parse(sessionStorage.getItem('unlocked') || '[]');
    if (!unlocked.includes(boardId)) {
      const pw = await promptPassword(board.title);
      if (pw === null) return;
      const hash = await sha256(pw);
      if (hash !== board.password_hash) { toast('密码错误'); return; }
      unlocked.push(boardId);
      sessionStorage.setItem('unlocked', JSON.stringify(unlocked));
    }
  }

  currentBoardId = boardId;
  STORE = STORE_PREFIX + boardId;

  // Load board state into S
  const localData = JSON.parse(localStorage.getItem(STORE) || 'null');
  if (localData) {
    S.title = localData.title || board.title;
    S.columns = localData.columns || board.columns || DEF.columns;
    S.rows = localData.rows || [];
    S.groupBy = localData.groupBy || board.group_by || [];
    S.filters = localData.filters || board.filters || [];
    S.sorts = localData.sorts || board.sorts || [];
  } else {
    S.title = board.title;
    S.columns = board.columns && board.columns.length ? board.columns : DEF.columns.map(c=>({...c}));
    S.rows = [];
    S.groupBy = board.group_by || [];
    S.filters = board.filters || [];
    S.sorts = board.sorts || [];
  }
  // Normalize rows
  S.rows.forEach(r => {
    if(r.p===undefined) r.p=null;
    if(r.col===undefined) r.col=false;
    S.columns.forEach(c => {
      if((c.type==='select'||c.type==='url')&&!Array.isArray(r.cells[c.id])) r.cells[c.id]=[];
      if(c.type==='bool'&&r.cells[c.id]===undefined) r.cells[c.id]=false;
    });
  });

  // Show board page
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('boardPage').classList.add('bp-visible');

  // Update title display
  document.getElementById('titleDisplay').textContent = (board.emoji || '📋') + ' ' + S.title;

  renderTable();
  history.pushState(null, '', '#/board/' + boardId);

  // Then sync from cloud (merge, not overwrite)
  syncBoardFromCloud(boardId).then(() => {
    subscribeBoard(boardId);
    setSyncBadge('ok');
  });
}

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
function renderHome() {
  const grid = document.getElementById('boardsGrid');
  if (!homeBoards.length) {
    grid.innerHTML = '<div class="hp-empty"><div class="hp-empty-icon">📋</div><div>还没有清单，点右上角新建一个吧</div></div>';
    return;
  }
  grid.innerHTML = homeBoards.map(b => {
    const rowsLocal = JSON.parse(localStorage.getItem(STORE_PREFIX + b.id) || 'null');
    const rows = rowsLocal ? rowsLocal.rows || [] : [];
    const total = rows.length;
    const done = rows.filter(r => r.done).length;
    const progress = total > 0 ? (done / total * 100) : 0;
    const timeStr = b.updated_at ? new Date(b.updated_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}) : '';
    const allDoneClass = (done === total && total > 0) ? 'all-done' : '';
    return `<div class="board-card ${allDoneClass}" onclick="openBoard('${b.id}')">
      <button class="board-card-menu-btn" onclick="event.stopPropagation();showBoardMenu(event,'${b.id}')">⋯</button>

async function toggleBoardVisibility(boardId) {
  const board = homeBoards.find(b => b.id === boardId);
  if (!board) return;
  if (board.visibility === 'private') {
    // private → public: just flip
    board.visibility = 'public';
    board.password_hash = null;
    board.updated_at = nowISO();
    saveHomeBoards();
    if (isOnline) await sb.from('boards').update({visibility:'public', password_hash:null, updated_at:board.updated_at}).eq('id', boardId);
    renderHome();
    toast('已改为公开 🌐');
  } else {
    // public → private: ask for password
    const pw = prompt('设置访问密码（留空则取消）');
    if (pw === null) return;
    if (!pw.trim()) { toast('密码不能为空'); return; }
    board.visibility = 'private';
    board.password_hash = await sha256(pw.trim());
    board.updated_at = nowISO();
    saveHomeBoards();
    if (isOnline) await sb.from('boards').update({visibility:'private', password_hash:board.password_hash, updated_at:board.updated_at}).eq('id', boardId);
    renderHome();
    toast('已改为私密 🔒');
  }
}

async function duplicateBoard(boardId) {
  const board = homeBoards.find(b => b.id === boardId);
  if (!board) return;
  const newId = uid();
  const newBoard = {
    ...board, id: newId,
    title: board.title + ' 副本',
    created_at: nowISO(), updated_at: nowISO(),
    password_hash: null, visibility: 'public'   // 复制出来默认公开，避免密码锁住
  };
  homeBoards.unshift(newBoard);
  saveHomeBoards();

  // ── 从本地 localStorage 拿源数据（最完整）──
  const localData = JSON.parse(localStorage.getItem(STORE_PREFIX + boardId) || 'null');
  const srcRows = (localData?.rows || []);
  const srcCount = srcRows.length;

  // 建立旧ID → 新ID的映射，保持父子关系
  const idMap = {};
  srcRows.forEach(r => { idMap[r.id] = gid(); });

  const copiedRows = srcRows.map(r => ({
    ...r,
    id: idMap[r.id],
    p: r.p ? (idMap[r.p] || null) : null,   // 修正 parent_id
    _updatedAt: nowISO(),
    syncId: null   // 不继承 syncId，避免跨表格状态混乱
  }));

  // 先写本地，立刻可用
  const newLocalData = {
    ...(localData || {}),
    title: newBoard.title,
    rows: copiedRows
  };
  localStorage.setItem(STORE_PREFIX + newId, JSON.stringify(newLocalData));
  renderHome();
  toast(`✅ 已复制 ${srcCount} 条，同步中…`);

  // 再异步推云端
  if (isOnline) {
    try { await sb.from('boards').insert(newBoard); } catch(e) {}
    const dbRows = copiedRows.map((r, i) => rowToDb(r, newId, i));
    const BATCH = 50;
    for (let i = 0; i < dbRows.length; i += BATCH) {
      try { await sb.from('rows').insert(dbRows.slice(i, i + BATCH)); } catch(e) {}
    }
  }
  toast(`✅ 清单已复制完成（${srcCount} 条）`);
}

async function deleteBoardConfirm(boardId) {
  if (!confirm('确定删除？数据无法恢复。')) return;
  homeBoards = homeBoards.filter(b => b.id !== boardId);
  saveHomeBoards();
  localStorage.removeItem(STORE_PREFIX + boardId);
  if (isOnline) {
    try { await sb.from('boards').delete().eq('id', boardId); } catch(e) {}
    try { await sb.from('rows').delete().eq('board_id', boardId); } catch(e) {}
  }
  renderHome();
  toast('已删除');
}

/* ═══ FILTER LOGIC ═══ */
function rowPassesFilters(row){
  if(!S.filters.length)return true;
  return S.filters.every(f=>{
    const col=S.columns.find(c=>c.id===f.colId);if(!col)return true;
    const val=row.cells[f.colId];
    let str='';
    if(col.type==='select')str=(val||[]).map(id=>{const o=(col.options||[]).find(x=>x.id===id);return o?o.label:'';}).join('、');
    else if(col.type==='url')str=(val||[]).map(u=>u.title+''+u.href).join(' ');
    else str=String(val||'');
    if(f.op==='包含')return str.includes(f.val);
    if(f.op==='不包含')return !str.includes(f.val);
    if(f.op==='等于')return str===f.val;
    if(f.op==='不等于')return str!==f.val;
    if(f.op==='为空')return !str.trim();
    if(f.op==='不为空')return !!str.trim();
    return true;
  });
}

/* ═══ SORT LOGIC ═══ */
function getRowSortVal(row,colId){
  const col=S.columns.find(c=>c.id===colId);if(!col)return '';
  const val=row.cells[colId];
  if(col.type==='select')return (val||[]).map(id=>{const o=(col.options||[]).find(x=>x.id===id);return o?o.label:'';}).join('');
  if(col.type==='date')return val||'';
  if(col.type==='number')return parseFloat(val)||0;
  if(col.type==='bool')return val?1:0;
  return String(val||'');
}

/* ═══ SEARCH ═══ */
function onSearch(q){searchQ=q.toLowerCase();renderTable();}
function rowMatchesSearch(row){
  if(!searchQ)return true;
  return S.columns.some(col=>{
    const val=row.cells[col.id];
    if(col.type==='select')return (val||[]).some(id=>{const o=(col.options||[]).find(x=>x.id===id);return o&&o.label.toLowerCase().includes(searchQ);});
    if(col.type==='url')return (val||[]).some(u=>(u.title+u.href).toLowerCase().includes(searchQ));
    return String(val||'').toLowerCase().includes(searchQ);
  });
}
function hlText(text){
  if(!searchQ||!text)return esc(text);
  const re=new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark class="hl">$1</mark>');
}

/* ═══ GROUP KEY ═══ */
function getGroupKey(row){
  if(!S.groupBy.length)return null;
  return S.groupBy.map(colId=>{
    const col=S.columns.find(c=>c.id===colId);if(!col)return '无';
    const val=row.cells[colId];
    if(col.type==='select'){const ids=Array.isArray(val)?val:[];if(!ids.length)return'（无'+col.label+'）';return ids.map(id=>{const o=(col.options||[]).find(x=>x.id===id);return o?o.label:'?';}).join('、');}
    if(col.type==='date')return val?val.slice(0,7):'（无日期）';
    return val||'（空）';
  }).join(' › ');
}

/* ═══ FLATTEN TREE ═══ */
function flattenTree(row,result,depth){
  result.push({row,depth});
  if(!row.col){const ch=S.rows.filter(r=>r.p===row.id);ch.forEach(c=>flattenTree(c,result,depth+1));}
}
function getDepth(id){let d=0,cur=S.rows.find(r=>r.id===id);while(cur&&cur.p){d++;cur=S.rows.find(r=>r.id===cur.p);}return d;}

/* ═══ BUILD DISPLAY ROWS ═══ */
function buildRows(){
  // top-level rows
  let tops=S.rows.filter(r=>!r.p);
  // apply filters
  tops=tops.filter(r=>rowPassesFilters(r));
  // apply search
  tops=tops.filter(r=>rowMatchesSearch(r));
  // apply sorts
  if(S.sorts.length){
    tops=[...tops].sort((a,b)=>{
      for(const s of S.sorts){
        const av=getRowSortVal(a,s.colId),bv=getRowSortVal(b,s.colId);
        if(av<bv)return s.dir==='asc'?-1:1;
        if(av>bv)return s.dir==='asc'?1:-1;
      }
      return 0;
    });
  }
  if(!S.groupBy.length){
    const result=[];
    tops.forEach(r=>flattenTree(r,result,0));
    return{grouped:false,rows:result};
  }
  const groups={},order=[];
  tops.forEach(r=>{
    const k=getGroupKey(r);
    if(!groups[k]){groups[k]=[];order.push(k);}
    groups[k].push(r);
  });
  return{grouped:true,groups,order};
}

  S.columns.forEach(col=>{

    hh+=`<th data-col="${col.id}" style="min-width:${col.width||140}px;width:${col.width||140}px"
      draggable="true"

        <button class="th-menu-btn" onclick="event.stopPropagation();openColMenu('${col.id}',this)">⋯</button>
      </div>

  // Body

    let vi=0;

          <span class="gcnt">${total}条记录</span>
          <span class="gdone">${done}已完成</span>
        </div></td></tr>`;
      if(!isColl){
        gr.forEach(row=>{
          const flat=[];flattenTree(row,flat,0);
          flat.forEach(({row:r,depth})=>{vi++;bh+=renderRowHtml(r,vi,depth,totalCols);});
        });
      }
    });
  }
  bh+=`<tr class="add-row-tr"><td colspan="${totalCols}">
    <button class="add-row-btn" onclick="addRow()">＋ 添加一行</button></td></tr>`;
  tbody.innerHTML=bh;

  // Auto-resize textareas
  tbody.querySelectorAll('textarea').forEach(ta=>autoResize(ta));

  // Mobile card view (called here so single renderTable() handles both)
  renderMobileCards();
}

  if(isLong)exp=`<button class="cell-expand-btn" onclick="event.stopPropagation();toggleExp('${row.id}','${col.id}')">${isExp?'↑ 收起':'↓ 展开'}</button>`;
  let result = `<div class="cell-text-wrap" onclick="startEdit('${row.id}','${col.id}',this)">
    <div class="cell-text-view ${isLong&&!isExp?'clamped':''}">${displayText||'<span style="color:var(--text3)">—</span>'}</div>${exp}</div>`;
  // Child progress for first column
  const colIdx = S.columns.findIndex(c => c.id === col.id);
  if (colIdx === 0) {
    const children = S.rows.filter(r => r.p === row.id);
    if (children.length > 0) {
      const done = children.filter(r => r.done).length;
      const pct = Math.round(done / children.length * 100);
      result += `<div style="margin-top:4px;display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:3px;background:#f0f1f3;border-radius:100px">
          <div style="width:${pct}%;height:100%;background:#4caf82;border-radius:100px"></div>
        </div>
        <span style="font-size:11px;color:#9fa8b5">${done}/${children.length}</span>
      </div>`;
    }
  }
  return result;
}

function addRow(){

  S.columns.forEach(c=>{cells[c.id]=(c.type==='select'||c.type==='url')?[]:c.type==='bool'?false:'';});
  S.rows.push({id:gid(),p:null,col:false,done:false,cells});

function addChild(parentId){
  const cells={};
  S.columns.forEach(c=>{cells[c.id]=(c.type==='select'||c.type==='url')?[]:c.type==='bool'?false:'';});
  const pi=S.rows.findIndex(r=>r.id===parentId);
  let ins=pi+1;
  while(ins<S.rows.length&&S.rows[ins].p===parentId)ins++;
  S.rows.splice(ins,0,{id:gid(),p:parentId,col:false,done:false,cells});
  const parent=S.rows.find(r=>r.id===parentId);
  if(parent)parent.col=false;

function duplicateRow(rowId){

  const idx=S.rows.findIndex(r=>r.id===rowId);
  const newRow={...JSON.parse(JSON.stringify(row)),id:gid()};
  S.rows.splice(idx+1,0,newRow);
  save();renderTable();toast('已复制');
}
function deleteRow(rowId){
  const toDelete=new Set([rowId]);
  let changed=true;
  while(changed){changed=false;S.rows.forEach(r=>{if(r.p&&toDelete.has(r.p)&&!toDelete.has(r.id)){toDelete.add(r.id);changed=true;}});}

function toggleDone(rowId,event){

  row.done=!row.done;
  if (row.done) { row.doneDate = new Date().toISOString().split('T')[0]; if(row.recurring) createNextRecurrence(row); }
  S.rows.forEach(r=>{if(r.p===rowId)r.done=row.done;});

  if(row.syncId) {

}

/* ─────────────────────────────────────
   SYNC ID — cross-board row sync
───────────────────────────────────────
  Each row can have a syncId (short string).
  Any cell change on a synced row will update
  ALL rows with the same syncId across all boards
  via Supabase. URL cells (type=url) are excluded.
──────────────────────────────────────── */
/* ── 联动管理：同一清单内两条 todo 互相绑定 ──
   逻辑：
   - 第一次点⬡：选中这行，等待选第二行（进入「待配对」状态）
   - 第二次点⬡（另一行）：把两行绑定同一个 syncId
   - 点已绑定的🔗：解除绑定（同时解除对方）
*/
let _syncPendingRowId = null; // 等待配对的第一行

function manageSyncId(rowId) {
  const row = S.rows.find(r => r.id === rowId);
  if (!row) return;

  // 已有绑定 → 弹窗询问解除
  if (row.syncId) {
    showSyncInfoPopup(rowId);
    return;
  }

  // 还没有绑定 → 进入配对流程
  if (!_syncPendingRowId) {
    // 第一步：标记这行为「待配对」
    _syncPendingRowId = rowId;
    row._syncPending = true;
    renderTable();
    toast('🔗 已选中，再点另一条 todo 的 ⬡ 完成联动');
    return;
  }

  if (_syncPendingRowId === rowId) {
    // 点了同一行 → 取消
    _syncPendingRowId = null;
    row._syncPending = false;
    renderTable();
    toast('已取消');
    return;
  }

  // 第二步：配对！两行绑定同一个 syncId
  const firstRow = S.rows.find(r => r.id === _syncPendingRowId);
  if (!firstRow) { _syncPendingRowId = null; return; }

  const syncKey = 'link_' + gid().slice(0, 8);
  firstRow.syncId = syncKey;
  firstRow._syncPending = false;
  row.syncId = syncKey;
  _syncPendingRowId = null;

  save(); renderTable();
  toast(`✅ 已联动：完成任一个，另一个同步完成`);

  if (isOnline && currentBoardId) {
    sb.from('rows').update({ sync_id: syncKey }).in('id', [firstRow.id, row.id]).then(() => {});
  }
}

function showSyncInfoPopup(rowId) {
  const row = S.rows.find(r => r.id === rowId);
  if (!row) return;
  // 找到所有绑定同一 syncId 的行
  const partners = S.rows.filter(r => r.syncId === row.syncId && r.id !== rowId);
  const partnerNames = partners.map(r => `「${r.cells[S.columns[0]?.id] || '无标题'}」`).join('、');
  const msg = partners.length
    ? `此条 todo 已与 ${partnerNames} 联动\n\n点「确定」解除联动`
    : `此条 todo 有联动 Key，但找不到配对行\n\n点「确定」清除`;
  if (confirm(msg)) {
    // 解除所有绑定同一 syncId 的行
    S.rows.forEach(r => { if (r.syncId === row.syncId) r.syncId = null; });
    save(); renderTable(); toast('已解除联动');
    if (isOnline && currentBoardId) {
      sb.from('rows').update({ sync_id: null }).eq('sync_id', row.syncId).then(() => {});
    }
  }
}

function clBarLink(remoteRowId, remoteBoardId) {

let selectMode = false;
let selectedIds = new Set();
let lastSelectedIdx = -1;

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  lastSelectedIdx = -1;
  const btn = document.getElementById('selectModeBtn');
  if (btn) btn.classList.toggle('active', selectMode);
  updateBatchBar();
  renderTable();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  lastSelectedIdx = -1;
  const btn = document.getElementById('selectModeBtn');
  if (btn) btn.classList.remove('active');
  updateBatchBar();
  renderTable();
}

function toggleRowSelect(rowId, shiftKey) {
  const visibleIds = getVisibleRowIds();
  const idx = visibleIds.indexOf(rowId);
  if (shiftKey && lastSelectedIdx >= 0 && idx >= 0) {
    const lo = Math.min(lastSelectedIdx, idx);
    const hi = Math.max(lastSelectedIdx, idx);
    visibleIds.slice(lo, hi + 1).forEach(id => selectedIds.add(id));
  } else {
    if (selectedIds.has(rowId)) selectedIds.delete(rowId);
    else selectedIds.add(rowId);
    lastSelectedIdx = idx;
  }
  updateBatchBar();
  renderTable();
}

function getVisibleRowIds() {
  // Returns ids of rows currently rendered (respects filters/groups)
  return S.rows.map(r => r.id); // simplified; full filter logic would be heavier
}

function updateBatchBar() {
  const bar = document.getElementById('batchBar');
  const cnt = document.getElementById('batchCount');
  if (!bar) return;
  if (selectMode && selectedIds.size > 0) {
    bar.style.display = 'flex';
    cnt.textContent = `已选 ${selectedIds.size} 行`;
  } else {
    bar.style.display = 'none';
  }
}

function batchDone() {
  S.rows.forEach(r => { if (selectedIds.has(r.id)) { r.done = true; if(r.syncId) syncCellAcrossBoards(r.syncId,{done:true}); } });
  save(); renderTable(); updateBatchBar(); toast(`✅ ${selectedIds.size} 条已完成`);
}
function batchUndone() {
  S.rows.forEach(r => { if (selectedIds.has(r.id)) { r.done = false; if(r.syncId) syncCellAcrossBoards(r.syncId,{done:false}); } });
  save(); renderTable(); updateBatchBar(); toast(`↩ ${selectedIds.size} 条已撤销`);
}
function batchDuplicate() {
  const newRows = [];
  S.rows.forEach(r => {
    if (selectedIds.has(r.id)) {
      newRows.push({...r, id:'r'+Date.now()+Math.random().toString(36).slice(2,6), syncId:null});
    }
  });
  S.rows.push(...newRows);
  save(); renderTable(); toast(`⎘ 已复制 ${newRows.length} 行`);
}
function batchDelete() {
  if (!confirm(`确定删除选中的 ${selectedIds.size} 行？`)) return;
  S.rows = S.rows.filter(r => !selectedIds.has(r.id));
  selectedIds.clear();
  save(); renderTable(); updateBatchBar(); toast('已删除');
}
function batchClear() {
  S.rows.forEach(r => { if (selectedIds.has(r.id)) r.cells = {}; });
  save(); renderTable(); toast('已清空内容');
}
function batchSetSyncId() {
  const key = prompt(`为选中的 ${selectedIds.size} 行设置同步 Key\n（两个清单里相同 Key 的行会互相同步）\n\n输入 Key 名称，或留空自动生成：`);
  if (key === null) return;
  const syncKey = key.trim() || 'sync_' + Math.random().toString(36).slice(2, 7);
  let count = 0;
  S.rows.forEach(r => {
    if (selectedIds.has(r.id)) { r.syncId = syncKey; count++; }
  });
  save(); renderTable(); updateBatchBar();
  toast(`🔗 已为 ${count} 行设置同步 Key: ${syncKey}`);
  if (isOnline && currentBoardId) {
    const ids = [...selectedIds];
    sb.from('rows').update({ sync_id: syncKey }).in('id', ids).then(() => {});
  }
}

async function syncCellAcrossBoards(syncId, patch) {
  // patch = { done?, cells? } — never includes url-type cells
  if (!syncId) return;

  // 同步本地其他所有清单的 localStorage（离线也能用）
  homeBoards.forEach(board => {
    if (board.id === currentBoardId) return;
    const key = STORE_PREFIX + board.id;
    const data = JSON.parse(localStorage.getItem(key) || 'null');
    if (!data?.rows) return;
    let changed = false;
    data.rows.forEach(r => {
      if (r.syncId === syncId) {
        if (patch.done !== undefined) { r.done = patch.done; changed = true; }
      }
    });
    if (changed) localStorage.setItem(key, JSON.stringify(data));
  });

  if (!isOnline) return;
  try {
    await sb.from('rows').update({ ...patch, updated_at: nowISO() }).eq('sync_id', syncId);
  } catch(e) {}
}

function updCellWithSync(rowId, colId, value) {
  const row = S.rows.find(r => r.id === rowId);
  if (!row) return;
  const col = S.columns.find(c => c.id === colId);
  row.cells[colId] = value;
  save();
  // sync non-url cells
  if (row.syncId && col && col.type !== 'url') {
    const cellsPatch = { [`cells`]: row.cells };
    // Supabase jsonb update: send full cells object (simpler than per-key patch)
    syncCellAcrossBoards(row.syncId, { cells: row.cells });
  }
}

/* ═══ DRAG COLUMNS ═══ */
function colDragStart(e,colId){dragColId=colId;e.dataTransfer.effectAllowed='move';}
function colDragOver(e,colId){
  if(!dragColId||dragColId===colId)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const th=e.currentTarget;
  const r=th.getBoundingClientRect();
  const mid=(r.left+r.right)/2;
  document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('th-drag-over-left','th-drag-over-right');});
  th.classList.add(e.clientX<mid?'th-drag-over-left':'th-drag-over-right');
}
function colDragLeave(e){e.currentTarget.classList.remove('th-drag-over-left','th-drag-over-right');}
function colDrop(e,targetColId){
  e.preventDefault();
  if(!dragColId||dragColId===targetColId)return;
  const th=e.currentTarget;
  const r=th.getBoundingClientRect();const mid=(r.left+r.right)/2;
  const fromIdx=S.columns.findIndex(c=>c.id===dragColId);
  let toIdx=S.columns.findIndex(c=>c.id===targetColId);
  if(e.clientX>mid)toIdx++;
  if(fromIdx===toIdx)return;
  const col=S.columns.splice(fromIdx,1)[0];
  const ins=fromIdx<toIdx?toIdx-1:toIdx;
  S.columns.splice(ins,0,col);
  save();dragColId=null;renderTable();
}
function colDragEnd(){
  dragColId=null;
  document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('th-drag-over-left','th-drag-over-right');});
}

/* ═══ DRAG ROWS ═══ */
function rowDragStart(e,rowId){dragRowId=rowId;e.dataTransfer.effectAllowed='move';}
function rowDragOver(e,rowId){
  if(!dragRowId||dragRowId===rowId)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('row-drag-over'));
  e.currentTarget.classList.add('row-drag-over');
}
function rowDrop(e,targetRowId){
  e.preventDefault();
  document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('row-drag-over'));
  if(!dragRowId||dragRowId===targetRowId)return;
  const fromIdx=S.rows.findIndex(r=>r.id===dragRowId);
  let toIdx=S.rows.findIndex(r=>r.id===targetRowId);
  if(fromIdx<0||toIdx<0)return;
  const row=S.rows.splice(fromIdx,1)[0];
  const ins=fromIdx<toIdx?toIdx:toIdx;
  S.rows.splice(ins,0,row);
  save();dragRowId=null;renderTable();
}
function rowDragEnd(){

}

function exportCSV(){
  let csv=['完成','序号','层级',...S.columns.map(c=>c.label)].join(',')+'\n';
  S.rows.forEach((row,i)=>{
    const depth=getDepth(row.id);
    const cells=[row.done?'✓':'',i+1,depth,...S.columns.map(col=>{
      const val=row.cells[col.id];
      if(col.type==='select')return'"'+(val||[]).map(id=>{const o=(col.options||[]).find(x=>x.id===id);return o?o.label:'';}).filter(Boolean).join('、')+'"';
      if(col.type==='url')return'"'+(val||[]).map(u=>u.title+'('+u.href+')').join(' | ')+'"';
      if(col.type==='bool')return val?'✓':'';
      return'"'+String(val||'').replace(/"/g,'""')+'"';
    })];
    csv+=cells.join(',')+'\n';
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(S.title||'todo')+'.csv';a.click();
}

function mCard(row,vi,depth){
  const fc=S.columns[0];
  const title=String(row.cells[fc.id]||'（无标题）');
  const hasChildren=S.rows.some(r=>r.p===row.id);
  let body='';
  S.columns.slice(1).forEach(col=>{
    const val=row.cells[col.id];
    let content='';
    if(col.type==='select'){
      const ids=Array.isArray(val)?val:[];
      if(!ids.length)return;
      content=ids.map(oid=>{
        const opt=(col.options||[]).find(o=>o.id===oid);if(!opt)return'';
        const c=TAG_COLORS[opt.colorIdx%TAG_COLORS.length];
        return`<span class="tag-pill" style="background:${c.bg};color:${c.fg}">${esc(opt.label)}</span>`;
      }).filter(Boolean).join('');
    } else if(col.type==='date'){
      if(!val)return;
      const isOverdue=val<new Date().toISOString().slice(0,10)&&!row.done;
      content=`<span style="color:${isOverdue?'#e35454':'var(--text2)'}">📅 ${esc(val)}</span>`;
    } else if(col.type==='url'){
      const urls=Array.isArray(val)?val:[];
      if(!urls.length)return;
      content=urls.map(u=>`<a href="${esc(u.href)}" target="_blank" style="color:#2563eb;text-decoration:none">🔗 ${esc(u.title||u.href)}</a>`).join(' ');
    } else if(col.type==='bool'){
      if(!val)return;
      content=`<span style="color:var(--accent)">✓ ${esc(col.label)}</span>`;
    } else {
      const s=String(val||'');if(!s.trim())return;
      content=`<span style="color:var(--text2)">${esc(s.length>80?s.slice(0,80)+'…':s)}</span>`;
    }
    if(!content)return;
    body+=`<div class="m-field"><span class="m-field-lbl">${esc(col.label)}：</span>${content}</div>`;
  });
  return`<div class="m-card ${row.done?'done':''} ${depth>0?'child':''}">
    <div class="m-card-top">
      <div class="custom-check m-card-check ${row.done?'checked':''}" onclick="toggleDone('${row.id}',event);renderMobileCards()"></div>
      ${hasChildren?`<button class="m-toggle" onclick="event.stopPropagation();toggleChildren('${row.id}');renderMobileCards()">${row.col?'▶':'▼'}</button>`:''}
      <div class="m-card-title ${row.done?'struck':''}">${searchQ?hlText(title):esc(title)}</div>
    </div>
    ${body?`<div class="m-card-body">${body}</div>`:''}
    <div class="m-card-footer">
      <span class="m-card-num">#${vi}</span>
      <button class="m-btn" onclick="addChild('${row.id}');renderMobileCards()">⤵ 子项</button>
      <button class="m-btn" onclick="duplicateRow('${row.id}');renderMobileCards()">⎘</button>
      <button class="m-btn del" onclick="if(confirm('删除这条吗？'))deleteRow('${row.id}')">删除</button>
    </div>
  </div>`;
}
