<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Todo清单">
  <meta name="theme-color" content="#4caf82">
  <title>Todo清单</title>
  <link rel="manifest" id="manifestLink">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f5f6fa; --white:#fff; --border:#e0e3e8; --border2:#c9cdd4;
      --text:#1f2329; --text2:#646a73; --text3:#9fa8b5;
      --accent:#4caf82; --accent2:#3d9970;
      --row-hover:#f7f8fa; --header-bg:#f0f2f5;
      --shadow:0 2px 12px rgba(0,0,0,.08);
      --danger:#e53935; --warning:#fb8c00; --info:#1e88e5;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; }
    .hidden { display:none !important; }
    
    /* Top Bar */
    .top-bar { background:var(--white); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .top-bar h1 { font-size:18px; font-weight:600; }
    .btn { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; gap:6px; transition:all .15s; }
    .btn:hover { background:var(--accent2); }
    .btn-secondary { background:var(--header-bg); color:var(--text); }
    .btn-secondary:hover { background:var(--border); }
    .btn-danger { background:var(--danger); }
    .btn-danger:hover { background:#c62828; }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-icon { width:32px; height:32px; padding:0; justify-content:center; border-radius:8px; background:transparent; color:var(--text2); }
    .btn-icon:hover { background:var(--bg); color:var(--text); }
    
    /* Sync Badge */
    .sync-badge { font-size:12px; padding:2px 10px; border-radius:20px; margin-left:12px; }
    .sync-ok { background:#eaf7f0; color:#2d7a4f; }
    .sync-ing { background:#fff8e1; color:#c57c00; }
    .sync-off { background:#fff0f0; color:#c0476e; }
    
    /* Homepage */
    .homepage { padding:20px; max-width:1200px; margin:0 auto; }
    .boards-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-top:20px; }
    @media(min-width:768px){ .boards-grid { grid-template-columns:repeat(3,1fr); } }
    
    .board-card { background:#fff; border-radius:14px; border:1px solid var(--border); padding:18px; cursor:pointer; transition:all .2s; box-shadow:0 1px 4px rgba(0,0,0,.06); position:relative; }
    .board-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.1); transform:translateY(-2px); }
    .board-card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .board-emoji { font-size:28px; line-height:1; }
    .board-title { font-size:16px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .board-meta { display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text2); }
    .board-badge { font-size:11px; padding:2px 6px; border-radius:4px; background:var(--header-bg); }
    .board-menu { position:absolute; top:12px; right:12px; opacity:0; transition:opacity .2s; }
    .board-card:hover .board-menu { opacity:1; }
    .board-card .btn-icon { background:var(--white); box-shadow:0 1px 3px rgba(0,0,0,.1); }
    
    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:500; padding:20px; }
    .modal { background:var(--white); border-radius:16px; max-width:440px; width:100%; max-height:90vh; overflow:auto; }
    .modal-header { padding:20px 20px 0; }
    .modal-header h2 { font-size:18px; font-weight:600; }
    .modal-body { padding:20px; }
    .modal-footer { padding:0 20px 20px; display:flex; justify-content:flex-end; gap:10px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--text2); }
    .form-input, .form-select, .form-textarea { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; transition:border-color .15s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--accent); }
    .form-textarea { min-height:80px; resize:vertical; }
    
    /* Emoji Picker */
    .emoji-picker { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; max-height:200px; overflow-y:auto; padding:8px; border:1px solid var(--border); border-radius:8px; }
    .emoji-option { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; border-radius:6px; transition:background .15s; }
    .emoji-option:hover, .emoji-option.active { background:var(--bg); }
    
    /* Toggle Switch */
    .toggle { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .toggle-switch { width:44px; height:24px; background:var(--border2); border-radius:12px; position:relative; transition:background .2s; }
    .toggle-switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .toggle input { display:none; }
    .toggle input:checked + .toggle-switch { background:var(--accent); }
    .toggle input:checked + .toggle-switch::after { transform:translateX(20px); }
    
    /* Board View */
    .board-view { display:flex; flex-direction:column; height:100vh; }
    .board-toolbar { background:var(--white); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .toolbar-search { flex:1; min-width:200px; position:relative; }
    .toolbar-search input { width:100%; padding:8px 12px 8px 32px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
    .toolbar-search::before { content:'🔍'; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; }
    .toolbar-btn { padding:8px 12px; border:1px solid var(--border); background:var(--white); border-radius:8px; cursor:pointer; font-size:13px; display:inline-flex; align-items:center; gap:6px; }
    .toolbar-btn:hover { background:var(--bg); }
    .toolbar-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    
    /* Table */
    .table-container { flex:1; overflow:auto; background:var(--white); }
    table { width:100%; border-collapse:collapse; font-size:14px; min-width:600px; }
    th { background:var(--header-bg); padding:12px; text-align:left; font-weight:600; font-size:13px; color:var(--text2); border-bottom:1px solid var(--border); position:relative; white-space:nowrap; user-select:none; }
    th:hover { background:var(--border); }
    th .th-content { display:flex; align-items:center; gap:8px; }
    th .th-drag-handle { cursor:move; opacity:0.3; }
    th:hover .th-drag-handle { opacity:0.8; }
    th .th-menu { margin-left:auto; opacity:0; cursor:pointer; padding:2px 6px; border-radius:4px; }
    th:hover .th-menu { opacity:1; }
    th .th-menu:hover { background:var(--border2); }
    td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
    tr:hover td { background:var(--row-hover); }
    tr.selected td { background:rgba(76,175,130,.08) !important; }
    tr.done { opacity:0.6; }
    tr.dragging { opacity:0.5; }
    
    /* Row Controls */
    .row-checkbox { width:20px; text-align:center; }
    .row-checkbox input { cursor:pointer; }
    .row-handle { cursor:move; color:var(--text3); padding:0 4px; }
    .row-done { text-align:center; }
    .row-done input { width:18px; height:18px; cursor:pointer; accent-color:var(--accent); }
    .row-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
    tr:hover .row-actions { opacity:1; }
    
    /* Hierarchy */
    .row-indent { display:flex; align-items:center; gap:4px; }
    .row-toggle { width:20px; height:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); font-size:10px; }
    .row-toggle:hover { color:var(--text); }
    .row-spacer { width:20px; }
    .row-collapsed .row-children { display:none; }
    
    /* Cells */
    .cell-text, .cell-number { width:100%; min-height:32px; padding:6px 8px; border:1px solid transparent; border-radius:4px; background:transparent; font-size:14px; resize:none; overflow:hidden; font-family:inherit; line-height:1.4; }
    .cell-text:focus, .cell-number:focus { outline:none; border-color:var(--accent); background:var(--white); }
    .cell-text:hover, .cell-number:hover { background:var(--bg); }
    
    .cell-select { position:relative; }
    .select-display { display:flex; flex-wrap:wrap; gap:4px; min-height:32px; padding:4px; border:1px solid transparent; border-radius:4px; cursor:pointer; }
    .select-display:hover { background:var(--bg); }
    .tag { padding:2px 8px; border-radius:12px; font-size:12px; display:inline-flex; align-items:center; gap:4px; }
    .tag .remove { cursor:pointer; opacity:0.6; }
    .tag .remove:hover { opacity:1; }
    .select-popover { position:absolute; top:100%; left:0; z-index:50; background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); min-width:180px; padding:8px; margin-top:4px; }
    .tag-option { padding:6px 10px; cursor:pointer; border-radius:4px; display:flex; align-items:center; gap:8px; font-size:13px; }
    .tag-option:hover { background:var(--bg); }
    .tag-color { width:12px; height:12px; border-radius:50%; }
    .tag-add { border-top:1px solid var(--border); margin-top:6px; padding-top:6px; font-size:12px; color:var(--text2); }
    
    .cell-date input { padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:14px; font-family:inherit; }
    
    .cell-bool { text-align:center; }
    .cell-bool input { width:18px; height:18px; cursor:pointer; accent-color:var(--accent); }
    
    .url-list { display:flex; flex-direction:column; gap:4px; }
    .url-item { display:flex; align-items:center; gap:6px; font-size:13px; padding:4px 8px; background:var(--bg); border-radius:4px; }
    .url-item a { color:var(--accent); text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .url-item a:hover { text-decoration:underline; }
    .url-add { font-size:12px; color:var(--accent); cursor:pointer; padding:4px 8px; }
    
    /* Mobile Card View */
    @media(max-width:768px) {
      .table-container table { display:none; }
      .card-list { display:block; padding:12px; }
      .card-item { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
      .card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
      .card-checkbox { margin-right:auto; }
      .card-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; font-size:14px; }
      .card-label { width:70px; flex-shrink:0; color:var(--text2); font-size:12px; }
      .card-value { flex:1; }
    }
    @media(min-width:769px) { .card-list { display:none; } }
    
    /* Batch Bar */
    .batch-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1f2329; color:#fff; border-radius:12px; padding:10px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 4px 20px rgba(0,0,0,.3); z-index:600; }
    .batch-bar span { font-size:13px; opacity:0.9; }
    .batch-bar button { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.3); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
    .batch-bar button:hover { background:rgba(255,255,255,.1); }
    
    /* Panels */
    .panel { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:16px; margin:10px 20px; box-shadow:var(--shadow); }
    .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .panel-header h3 { font-size:15px; font-weight:600; }
    .filter-row, .sort-row { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
    .filter-row select, .sort-row select { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; }
    
    /* Dropdown Menu */
    .dropdown { position:relative; }
    .dropdown-menu { position:absolute; top:100%; right:0; background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); min-width:160px; z-index:200; padding:6px 0; }
    .dropdown-item { padding:8px 16px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:8px; }
    .dropdown-item:hover { background:var(--bg); }
    .dropdown-divider { height:1px; background:var(--border); margin:6px 0; }
    
    /* Password Modal */
    .password-modal { text-align:center; padding:40px 20px; }
    .password-modal .lock-icon { font-size:48px; margin-bottom:16px; }
    .password-modal h3 { margin-bottom:8px; }
    .password-modal p { color:var(--text2); font-size:14px; margin-bottom:24px; }
    
    /* Context Menu */
    .context-menu { position:fixed; background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); z-index:500; padding:6px 0; min-width:160px; }
    
    /* Empty State */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
    .empty-state-icon { font-size:48px; margin-bottom:16px; opacity:0.5; }
    
    /* Bottom Sheet (Mobile) */
    .bottom-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--white); border-radius:16px 16px 0 0; z-index:500; max-height:70vh; overflow:auto; padding:20px; box-shadow:0 -4px 20px rgba(0,0,0,.15); }
    .bottom-sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:499; }
    .bottom-sheet-handle { width:40px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
    .sheet-item { padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:12px; }
    .sheet-item:last-child { border-bottom:none; }
    
    /* FAB */
    .fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:24px; cursor:pointer; box-shadow:0 4px 12px rgba(76,175,130,.4); z-index:400; display:flex; align-items:center; justify-content:center; }
    .fab:hover { background:var(--accent2); transform:scale(1.05); }
    @media(min-width:769px) { .fab { display:none; } }
    
    /* Loading */
    .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text2); }
    .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-right:10px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    
    /* Toast */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(100px); background:#1f2329; color:#fff; padding:12px 20px; border-radius:8px; font-size:14px; z-index:700; opacity:0; transition:all .3s; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // ==================== CONFIG ====================
    const SUPABASE_URL = 'https://dbymgvfnydyunnxjsndh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0LvNrnUViQnaFfznZ1cCVw_K0RfNZ2P';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const EMOJIS = ['📋','✅','🎯','📅','💼','🏠','🎨','🎵','📚','💪','🍎','✈️','🎁','💡','🔥','⭐','❤️','🌟','🚀','⚡','🌈','🎊','🎉','🏆','⚽','🎮','💻','📱','🔧','📝','📌','🏷️','📎','🔗','⏰','🗓️','📊','📈','💰','💳','🛒','🎂','🎃','🎄','🌸','🌺','🌻','🌿','🍀','🌳'];
    const COLORS = ['#4caf82','#2196f3','#9c27b0','#ff5722','#ffc107','#795548','#607d8b','#e91e63','#3f51b5','#00bcd4'];
    
    // ==================== STATE ====================
    let state = {
      boards: [],
      currentBoard: null,
      rows: [],
      columns: [],
      selectedRows: new Set(),
      selectMode: false,
      searchQuery: '',
      filters: [],
      sorts: [],
      groupBy: null,
      syncStatus: 'ok',
      isOnline: navigator.onLine,
      readOnly: false,
      draggedRow: null,
      draggedCol: null,
      activeDropdown: null,
      unlockedBoards: new Set(JSON.parse(sessionStorage.getItem('unlockedBoards')||'[]'))
    };
    
    // ==================== UTILS ====================
    async function sha256(s) {
      const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
      return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
    }
    function uuid() { return crypto.randomUUID(); }
    function shortId() { return Math.random().toString(36).substring(2, 10); }
    function now() { return new Date().toISOString(); }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('zh-CN') : ''; }
    function formatTime(d) { return d ? new Date(d).toLocaleString('zh-CN') : ''; }
    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
    
    // ==================== LOCAL STORAGE ====================
    function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    function loadLocal(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
    
    // ==================== TOAST ====================
    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.classList.add('show'), 10);
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
    }
    
    // ==================== PWA ====================
    const manifest = {
      name: 'Todo清单',
      short_name: 'Todo',
      start_url: '/',
      display: 'standalone',
      background_color: '#f5f6fa',
      theme_color: '#4caf82',
      icons: [
        { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>', sizes: '96x96', type: 'image/svg+xml' }
      ]
    };
    document.getElementById('manifestLink').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:'application/json'}));
    
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    navigator.serviceWorker?.register(URL.createObjectURL(new Blob([swCode], {type:'application/javascript'}))).catch(() => {});
    
    // ==================== SUPABASE ====================
    async function loadBoards() {
      const cached = loadLocal('boards', null);
      if (cached) state.boards = cached;
      
      if (!state.isOnline) return;
      state.syncStatus = 'syncing'; render();
      
      const { data, error } = await sb.from('boards').select('*').order('updated_at', { ascending: false });
      if (!error && data) {
        state.boards = data;
        saveLocal('boards', data);
        state.syncStatus = 'ok';
      } else if (!cached) {
        state.syncStatus = 'offline';
      }
      render();
    }
    
    async function loadBoard(id) {
      const board = state.boards.find(b => b.id === id);
      if (!board) return;
      state.currentBoard = board;
      state.columns = board.columns || [{id:'col_title', name:'标题', type:'text', options:[]}];
      state.filters = board.filters || [];
      state.sorts = board.sorts || [];
      state.groupBy = board.group_by || null;
      
      const cached = loadLocal('rows_'+id, null);
      if (cached) state.rows = cached;
      
      if (!state.isOnline) { render(); return; }
      state.syncStatus = 'syncing'; render();
      
      const { data, error } = await sb.from('rows').select('*').eq('board_id', id).order('position');
      if (!error && data) {
        state.rows = data;
        saveLocal('rows_'+id, data);
        state.syncStatus = 'ok';
        subscribeToRows(id);
      } else if (!cached) {
        state.syncStatus = 'offline';
      }
      render();
    }
    
    function subscribeToRows(boardId) {
      sb.channel('rows_'+boardId).on('postgres_changes', { event: '*', schema: 'public', table: 'rows', filter: 'board_id=eq.'+boardId }, payload => {
        if (payload.eventType === 'INSERT') state.rows.push(payload.new);
        else if (payload.eventType === 'UPDATE') {
          const idx = state.rows.findIndex(r => r.id === payload.new.id);
          if (idx >= 0) state.rows[idx] = { ...state.rows[idx], ...payload.new };
        } else if (payload.eventType === 'DELETE') {
          state.rows = state.rows.filter(r => r.id !== payload.old.id);
        }
        render();
      }).subscribe();
    }
    
    const saveBoardDebounced = debounce(async (board) => {
      if (!state.isOnline) return;
      state.syncStatus = 'syncing'; render();
      await sb.from('boards').update({
        title: board.title, emoji: board.emoji, visibility: board.visibility,
        columns: board.columns, sorts: board.sorts, filters: board.filters,
        group_by: board.group_by, updated_at: now()
      }).eq('id', board.id);
      state.syncStatus = 'ok'; render();
    }, 500);
    
    const saveRowDebounced = debounce(async (row) => {
      if (!state.isOnline) return saveLocal('rows_'+row.board_id, state.rows);
      state.syncStatus = 'syncing';
      await sb.from('rows').upsert({
        id: row.id, board_id: row.board_id, parent_id: row.parent_id, done: row.done,
        collapsed: row.collapsed, cells: row.cells, position: row.position,
        visibility: row.visibility, sync_id: row.sync_id, updated_at: now()
      });
      state.syncStatus = 'ok';
    }, 500);
    
    // ==================== ROUTING ====================
    window.addEventListener('hashchange', route);
    function route() {
      const h = location.hash || '#/';
      state.activeDropdown = null;
      state.selectedRows.clear();
      state.selectMode = false;
      state.readOnly = false;
      
      if (h === '#/' || h === '') { showHomepage(); }
      else if (h.startsWith('#/board/')) {
        const parts = h.replace('?view=public','').split('/');
        const id = parts[2];
        state.readOnly = h.includes('?view=public');
        showBoard(id, state.readOnly);
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      const app = document.getElementById('app');
      if (!state.currentBoard) {
        app.innerHTML = renderHomepage();
        attachHomepageEvents();
      } else {
        app.innerHTML = renderBoardView();
        attachBoardEvents();
      }
    }
    
    function renderHomepage() {
      const syncBadge = state.syncStatus === 'ok' ? '<span class="sync-badge sync-ok">🟢 已同步</span>' :
                        state.syncStatus === 'syncing' ? '<span class="sync-badge sync-ing">🟡 同步中</span>' :
                        '<span class="sync-badge sync-off">🔴 离线</span>';
      
      return `
        <div class="top-bar">
          <h1>📋 我的清单 ${syncBadge}</h1>
          <button class="btn" id="btnNewBoard">＋ 新建</button>
        </div>
        <div class="homepage">
          ${state.boards.length === 0 ? `
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <h3>还没有清单</h3>
              <p>点击右上角新建按钮创建第一个清单</p>
            </div>
          ` : `
            <div class="boards-grid">
              ${state.boards.map(b => {
                const rowCount = state.rows.filter?.(r => r.board_id === b.id).length || 0;
                const doneCount = state.rows.filter?.(r => r.board_id === b.id && r.done).length || 0;
                return `
                  <div class="board-card" data-id="${b.id}" onclick="openBoard('${b.id}')">
                    <div class="board-menu" onclick="event.stopPropagation()">
                      <button class="btn btn-icon" data-menu="${b.id}">⋯</button>
                    </div>
                    <div class="board-card-header">
                      <span class="board-emoji">${b.emoji || '📋'}</span>
                      <span class="board-title">${escapeHtml(b.title)}</span>
                    </div>
                    <div class="board-meta">
                      <span>${rowCount} 项</span>
                      <span>${doneCount} 完成</span>
                      <span class="board-badge">${b.visibility === 'public' ? '🌐' : '🔒'}</span>
                      <span>${formatTimeAgo(b.updated_at)}</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
        <button class="fab" id="fabNew">＋</button>
      `;
    }
    
    function renderBoardView() {
      const b = state.currentBoard;
      const isPrivate = b.visibility === 'private' && !state.unlockedBoards.has(b.id) && !state.readOnly;
      
      if (isPrivate) return renderPasswordModal(b);
      
      const filteredRows = getFilteredRows();
      const syncBadge = state.syncStatus === 'ok' ? '<span class="sync-badge sync-ok">🟢 已同步</span>' :
                        state.syncStatus === 'syncing' ? '<span class="sync-badge sync-ing">🟡 同步中</span>' :
                        '<span class="sync-badge sync-off">🔴 离线</span>';
      
      return `
        <div class="board-view">
          <div class="top-bar">
            <div style="display:flex;align-items:center;gap:12px;">
              <button class="btn btn-secondary" onclick="backToHome()">← 返回</button>
              <span style="font-size:20px;">${b.emoji || '📋'}</span>
              <h1>${escapeHtml(b.title)} ${syncBadge}</h1>
            </div>
            <div style="display:flex;gap:8px;">
              ${!state.readOnly ? `<button class="btn btn-secondary" id="btnShare">🔗 分享</button>` : ''}
              <button class="btn" id="btnAddRow">＋ 添加</button>
            </div>
          </div>
          ${renderToolbar()}
          ${state.filters.length > 0 ? renderFilterPanel() : ''}
          ${state.sorts.length > 0 ? renderSortPanel() : ''}
          ${state.groupBy ? renderGroupPanel() : ''}
          <div class="table-container" id="tableContainer">
            ${renderTable(filteredRows)}
            ${renderCardList(filteredRows)}
          </div>
          ${state.selectMode && state.selectedRows.size > 0 ? renderBatchBar() : ''}
        </div>
        <button class="fab" id="fabAdd">＋</button>
      `;
    }
    
    function renderPasswordModal(b) {
      return `
        <div class="modal-overlay">
          <div class="modal password-modal" style="max-width:360px;">
            <div class="lock-icon">🔒</div>
            <h3>私密清单</h3>
            <p>请输入密码查看 "${escapeHtml(b.title)}"</p>
            <input type="password" class="form-input" id="passwordInput" placeholder="输入密码" style="text-align:center;margin-bottom:16px;" onkeypress="if(event.key==='Enter')checkPassword('${b.id}')">
            <button class="btn" style="width:100%;" onclick="checkPassword('${b.id}')">解锁</button>
            <button class="btn btn-secondary" style="width:100%;margin-top:10px;" onclick="backToHome()">返回</button>
          </div>
        </div>
      `;
    }
    
    function renderToolbar() {
      return `
        <div class="board-toolbar">
          <div class="toolbar-search">
            <input type="text" id="searchInput" placeholder="搜索..." value="${escapeHtml(state.searchQuery)}">
          </div>
          <button class="toolbar-btn ${state.filters.length ? 'active' : ''}" id="btnFilter">🔽 筛选</button>
          <button class="toolbar-btn ${state.sorts.length ? 'active' : ''}" id="btnSort">↕ 排序</button>
          <button class="toolbar-btn ${state.groupBy ? 'active' : ''}" id="btnGroup">⊞ 分组</button>
          <button class="toolbar-btn" id="btnExport">⬇ 导出</button>
          ${!state.readOnly ? `<button class="toolbar-btn ${state.selectMode ? 'active' : ''}" id="btnSelect">☑ 选择</button>` : ''}
        </div>
      `;
    }
    
    function renderFilterPanel() {
      return `
        <div class="panel" id="filterPanel">
          <div class="panel-header">
            <h3>筛选器</h3>
            <button class="btn-icon" onclick="clearFilters()">×</button>
          </div>
          ${state.filters.map((f, i) => `
            <div class="filter-row">
              <select onchange="updateFilter(${i}, 'column', this.value)">
                <option value="">选择列</option>
                ${state.columns.map(c => `<option value="${c.id}" ${f.column===c.id?'selected':''}>${c.name}</option>`).join('')}
              </select>
              <select onchange="updateFilter(${i}, 'op', this.value)">
                <option value="equals" ${f.op==='equals'?'selected':''}>等于</option>
                <option value="contains" ${f.op==='contains'?'selected':''}>包含</option>
                <option value="empty" ${f.op==='empty'?'selected':''}>为空</option>
              </select>
              ${f.op !== 'empty' ? `<input type="text" value="${escapeHtml(f.value||'')}" onchange="updateFilter(${i}, 'value', this.value)" placeholder="值">` : ''}
              <button class="btn btn-icon" onclick="removeFilter(${i})">🗑</button>
            </div>
          `).join('')}
          <button class="toolbar-btn" style="margin-top:8px;" onclick="addFilter()">＋ 添加筛选</button>
        </div>
      `;
    }
    
    function renderSortPanel() {
      return `
        <div class="panel" id="sortPanel">
          <div class="panel-header">
            <h3>排序</h3>
            <button class="btn-icon" onclick="clearSorts()">×</button>
          </div>
          ${state.sorts.map((s, i) => `
            <div class="sort-row">
              <select onchange="updateSort(${i}, 'column', this.value)">
                <option value="">选择列</option>
                ${state.columns.map(c => `<option value="${c.id}" ${s.column===c.id?'selected':''}>${c.name}</option>`).join('')}
              </select>
              <select onchange="updateSort(${i}, 'dir', this.value)">
                <option value="asc" ${s.dir==='asc'?'selected':''}>升序</option>
                <option value="desc" ${s.dir==='desc'?'selected':''}>降序</option>
              </select>
              <button class="btn btn-icon" onclick="removeSort(${i})">🗑</button>
            </div>
          `).join('')}
          <button class="toolbar-btn" style="margin-top:8px;" onclick="addSort()">＋ 添加排序</button>
        </div>
      `;
    }
    
    function renderGroupPanel() {
      return `
        <div class="panel" id="groupPanel">
          <div class="panel-header">
            <h3>分组依据</h3>
            <button class="btn-icon" onclick="clearGroup()">×</button>
          </div>
          <div class="filter-row">
            <select onchange="setGroupBy(this.value)">
              <option value="">不分组</option>
              ${state.columns.map(c => `<option value="${c.id}" ${state.groupBy===c.id?'selected':''}>${c.name}</option>`).join('')}
              <option value="done" ${state.groupBy==='done'?'selected':''}>完成状态</option>
            </select>
          </div>
        </div>
      `;
    }
    
    function renderTable(rows) {
      const roots = rows.filter(r => !r.parent_id);
      return `
        <table id="dataTable">
          <thead>
            <tr>
              ${state.selectMode ? '<th width="40">☑</th>' : ''}
              <th width="40"></th>
              <th width="40">✓</th>
              ${state.columns.map((c, i) => `
                <th draggable="true" data-col-idx="${i}">
                  <div class="th-content">
                    <span class="th-drag-handle">⋮⋮</span>
                    ${c.name}
                    <span class="th-menu" onclick="showColMenu(event, ${i})">⋯</span>
                  </div>
                </th>
              `).join('')}
              <th width="80">
                <button class="btn btn-sm btn-secondary" onclick="showAddColModal()">＋</button>
              </th>
            </tr>
          </thead>
          <tbody>
            ${roots.length === 0 ? '<tr><td colspan="'+(state.columns.length+4)+'" style="text-align:center;color:var(--text2);padding:40px;">暂无数据，点击添加按钮创建</td></tr>' : 
              roots.map((r, i) => renderRow(r, rows, i)).join('')}
          </tbody>
        </table>
      `;
    }
    
    function renderRow(row, allRows, index, level = 0) {
      const children = allRows.filter(r => r.parent_id === row.id);
      const hasChildren = children.length > 0;
      const isPrivateInPublic = state.readOnly && row.visibility === 'private';
      if (isPrivateInPublic) return '';
      
      return `
        <tr data-id="${row.id}" class="${row.done ? 'done' : ''}" draggable="true">
          ${state.selectMode ? `<td class="row-checkbox"><input type="checkbox" ${state.selectedRows.has(row.id)?'checked':''} onchange="toggleSelect('${row.id}')"></td>` : ''}
          <td class="row-handle">⋮⋮</td>
          <td class="row-done"><input type="checkbox" ${row.done ? 'checked' : ''} onchange="toggleDone('${row.id}')" ${state.readOnly?'disabled':''}></td>
          ${state.columns.map(c => renderCell(row, c)).join('')}
          <td>
            <div class="row-actions">
              ${!state.readOnly ? `<button class="btn btn-icon" onclick="addChild('${row.id}')" title="添加子项">＋</button>
              <button class="btn btn-icon" onclick="duplicateRow('${row.id}')" title="复制">⎘</button>
              <button class="btn btn-icon" onclick="deleteRow('${row.id}')" title="删除">🗑</button>` : ''}
            </div>
          </td>
        </tr>
        ${hasChildren && !row.collapsed ? children.map((c, i) => renderRow(c, allRows, i, level+1)).join('') : ''}
      `;
    }
    
    function renderCell(row, col) {
      const val = row.cells?.[col.id];
      switch(col.type) {
        case 'text':
          return `<td><textarea class="cell-text" rows="1" onblur="updateCell('${row.id}', '${col.id}', this.value)" ${state.readOnly?'readonly':''}>${escapeHtml(val||'')}</textarea></td>`;
        case 'number':
          return `<td><input type="number" class="cell-number" value="${escapeHtml(val||'')}" onblur="updateCell('${row.id}', '${col.id}', this.value)" ${state.readOnly?'readonly':''}></td>`;
        case 'date':
          return `<td class="cell-date"><input type="date" value="${val||''}" onchange="updateCell('${row.id}', '${col.id}', this.value)" ${state.readOnly?'disabled':''}></td>`;
        case 'bool':
          return `<td class="cell-bool"><input type="checkbox" ${val ? 'checked' : ''} onchange="updateCell('${row.id}', '${col.id}', this.checked)" ${state.readOnly?'disabled':''}></td>`;
        case 'select':
          const tags = Array.isArray(val) ? val : (val ? [val] : []);
          return `
            <td class="cell-select">
              <div class="select-display" onclick="${state.readOnly?'':'showTagPicker(event,\''+row.id+'\',\''+col.id+'\')'}">
                ${tags.map(t => {
                  const opt = (col.options||[]).find(o => o.value === t);
                  const color = opt?.color || '#e0e3e8';
                  return `<span class="tag" style="background:${color}20;color:${color};border:1px solid ${color}40">${t}</span>`;
                }).join('')}
              </div>
            </td>`;
        case 'url':
          const urls = Array.isArray(val) ? val : (val ? [{title:'链接',href:val}] : []);
          return `
            <td>
              <div class="url-list">
                ${urls.map(u => `<div class="url-item"><a href="${u.href}" target="_blank">${escapeHtml(u.title||u.href)}</a></div>`).join('')}
                ${!state.readOnly ? `<span class="url-add" onclick="addUrl('${row.id}', '${col.id}')">＋添加链接</span>` : ''}
              </div>
            </td>`;
        default:
          return `<td></td>`;
      }
    }
    
    function renderCardList(rows) {
      const roots = rows.filter(r => !r.parent_id);
      return `
        <div class="card-list">
          ${roots.length === 0 ? '<div style="text-align:center;color:var(--text2);padding:40px;">暂无数据</div>' :
            roots.map(r => renderCard(r, rows)).join('')}
        </div>
      `;
    }
    
    function renderCard(row, allRows) {
      const children = allRows.filter(r => r.parent_id === row.id);
      const isPrivateInPublic = state.readOnly && row.visibility === 'private';
      if (isPrivateInPublic) return '';
      
      return `
        <div class="card-item" data-id="${row.id}">
          <div class="card-header">
            ${state.selectMode ? `<label class="card-checkbox"><input type="checkbox" ${state.selectedRows.has(row.id)?'checked':''} onchange="toggleSelect('${row.id}')"></label>` : ''}
            <input type="checkbox" ${row.done ? 'checked' : ''} onchange="toggleDone('${row.id}')" ${state.readOnly?'disabled':''}>
            <span style="margin-left:auto;cursor:pointer;color:var(--text2);" onclick="showRowMenu('${row.id}', event)">⋯</span>
          </div>
          ${state.columns.filter(c => row.cells?.[c.id] != null && row.cells[c.id] !== '').map(c => `
            <div class="card-row">
              <div class="card-label">${c.name}</div>
              <div class="card-value">${renderCardValue(row, c)}</div>
            </div>
          `).join('')}
          ${!state.readOnly ? `<button class="btn btn-secondary btn-sm" style="margin-top:12px;width:100%;" onclick="addChild('${row.id}')">＋ 添加子任务</button>` : ''}
        </div>
        ${children.length && !row.collapsed ? children.map(c => renderCard(c, allRows)).join('') : ''}
      `;
    }
    
    function renderCardValue(row, col) {
      const val = row.cells?.[col.id];
      switch(col.type) {
        case 'text': return escapeHtml(val || '');
        case 'number': return val || '';
        case 'date': return formatDate(val);
        case 'bool': return val ? '✓' : '✗';
        case 'select':
          const tags = Array.isArray(val) ? val : (val ? [val] : []);
          return tags.map(t => {
            const opt = (col.options||[]).find(o => o.value === t);
            const color = opt?.color || '#e0e3e8';
            return `<span class="tag" style="background:${color}20;color:${color};border:1px solid ${color}40;margin:2px;">${t}</span>`;
          }).join('');
        case 'url':
          const urls = Array.isArray(val) ? val : (val ? [{title:'链接',href:val}] : []);
          return urls.map(u => `<a href="${u.href}" target="_blank" style="color:var(--accent);display:block;">${escapeHtml(u.title||u.href)}</a>`).join('');
        default: return '';
      }
    }
    
    function renderBatchBar() {
      const count = state.selectedRows.size;
      return `
        <div class="batch-bar">
          <span>已选择 ${count} 项</span>
          <button onclick="batchDone()">✅ 完成</button>
          <button onclick="batchDuplicate()">⎘ 复制</button>
          <button onclick="batchClear()">清空内容</button>
          <button onclick="batchDelete()">🗑 删除</button>
          <button onclick="clearSelection()">× 取消</button>
        </div>
      `;
    }
    
    // ==================== ACTIONS ====================
    async function createBoard() {
      const title = document.getElementById('newBoardTitle').value.trim();
      if (!title) return toast('请输入标题');
      const emoji = document.querySelector('.emoji-option.active')?.dataset.emoji || '📋';
      const visibility = document.getElementById('visibilityToggle').checked ? 'private' : 'public';
      const password = document.getElementById('boardPassword').value;
      
      const board = {
        id: uuid(), title, emoji, visibility,
        password_hash: password ? await sha256(password) : null,
        columns: [{id:'col_title', name:'标题', type:'text', options:[]}, {id:'col_status', name:'状态', type:'select', options:[{value:'待办',color:'#ff5722'},{value:'进行中',color:'#ffc107'},{value:'完成',color:'#4caf82'}]}],
        sorts: [], filters: [], group_by: null,
        created_at: now(), updated_at: now()
      };
      
      state.boards.unshift(board);
      saveLocal('boards', state.boards);
      if (state.isOnline) await sb.from('boards').insert(board);
      closeModal();
      render();
      toast('清单创建成功');
    }
    
    async function duplicateBoard(id) {
      const b = state.boards.find(x => x.id === id);
      if (!b) return;
      const newBoard = {
        ...b, id: uuid(), title: b.title + ' 副本',
        created_at: now(), updated_at: now()
      };
      state.boards.unshift(newBoard);
      saveLocal('boards', state.boards);
      
      const boardRows = loadLocal('rows_'+id, []);
      const newRows = boardRows.map(r => ({...r, id: shortId(), board_id: newBoard.id}));
      saveLocal('rows_'+newBoard.id, newRows);
      
      if (state.isOnline) {
        await sb.from('boards').insert(newBoard);
        if (newRows.length) await sb.from('rows').insert(newRows);
      }
      render();
      toast('清单复制成功');
    }
    
    async function deleteBoard(id) {
      if (!confirm('确定要删除这个清单吗？数据将无法恢复。')) return;
      state.boards = state.boards.filter(b => b.id !== id);
      saveLocal('boards', state.boards);
      localStorage.removeItem('rows_'+id);
      if (state.isOnline) {
        await sb.from('boards').delete().eq('id', id);
        await sb.from('rows').delete().eq('board_id', id);
      }
      render();
      toast('清单已删除');
    }
    
    async function renameBoard(id) {
      const b = state.boards.find(x => x.id === id);
      const newTitle = prompt('新标题:', b.title);
      if (!newTitle || newTitle === b.title) return;
      b.title = newTitle;
      b.updated_at = now();
      saveLocal('boards', state.boards);
      if (state.isOnline) await sb.from('boards').update({title: newTitle, updated_at: now()}).eq('id', id);
      render();
    }
    
    function shareBoard() {
      const url = location.origin + location.pathname + '#/board/' + state.currentBoard.id + '?view=public';
      navigator.clipboard.writeText(url);
      toast('分享链接已复制');
    }
    
    async function addRow() {
      if (!state.currentBoard || state.readOnly) return;
      const row = {
        id: shortId(), board_id: state.currentBoard.id, parent_id: null, done: false,
        collapsed: false, cells: {}, position: state.rows.length,
        visibility: 'public', sync_id: null, created_at: now(), updated_at: now()
      };
      state.rows.push(row);
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      saveBoardDebounced(state.currentBoard);
      render();
    }
    
    async function addChild(parentId) {
      if (!state.currentBoard || state.readOnly) return;
      const row = {
        id: shortId(), board_id: state.currentBoard.id, parent_id: parentId, done: false,
        collapsed: false, cells: {}, position: state.rows.length,
        visibility: 'public', sync_id: null, created_at: now(), updated_at: now()
      };
      state.rows.push(row);
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      saveRowDebounced(row);
      render();
    }
    
    async function duplicateRow(id) {
      const r = state.rows.find(x => x.id === id);
      if (!r) return;
      const newRow = {...r, id: shortId(), position: state.rows.length, created_at: now(), updated_at: now()};
      state.rows.push(newRow);
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      saveRowDebounced(newRow);
      render();
    }
    
    async function deleteRow(id) {
      if (!confirm('确定删除？')) return;
      const deleteIds = [id, ...getDescendantIds(id)];
      state.rows = state.rows.filter(r => !deleteIds.includes(r.id));
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      if (state.isOnline) {
        for (const id of deleteIds) await sb.from('rows').delete().eq('id', id);
      }
      render();
    }
    
    function getDescendantIds(parentId) {
      const children = state.rows.filter(r => r.parent_id === parentId);
      return children.flatMap(c => [c.id, ...getDescendantIds(c.id)]);
    }
    
    async function toggleDone(id) {
      const r = state.rows.find(x => x.id === id);
      if (!r) return;
      r.done = !r.done;
      r.updated_at = now();
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      
      if (r.sync_id && state.isOnline) {
        await sb.from('rows').update({done: r.done}).eq('sync_id', r.sync_id);
      }
      saveRowDebounced(r);
      render();
    }
    
    function updateCell(rowId, colId, val) {
      if (state.readOnly) return;
      const r = state.rows.find(x => x.id === rowId);
      if (!r) return;
      r.cells = {...r.cells, [colId]: val};
      r.updated_at = now();
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      saveRowDebounced(r);
    }
    
    // ==================== MULTI-SELECT ====================
    function toggleSelectMode() {
      state.selectMode = !state.selectMode;
      if (!state.selectMode) state.selectedRows.clear();
      render();
    }
    
    function toggleSelect(id) {

    async function batchDone() {
      const ids = Array.from(state.selectedRows);
      for (const id of ids) {
        const r = state.rows.find(x => x.id === id);
        if (r) { r.done = true; r.updated_at = now(); saveRowDebounced(r); }
      }
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      state.selectedRows.clear();
      render();

    async function batchDuplicate() {
      const ids = Array.from(state.selectedRows);
      for (const id of ids) {
        const r = state.rows.find(x => x.id === id);
        if (r) {
          const newRow = {...r, id: shortId(), position: state.rows.length, created_at: now(), updated_at: now()};
          state.rows.push(newRow);
          saveRowDebounced(newRow);
        }
      }
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      state.selectedRows.clear();
      render();
      toast('批量复制完成');
    }
    
    async function batchDelete() {
      if (!confirm('确定删除选中的 '+state.selectedRows.size+' 项？')) return;
      const ids = Array.from(state.selectedRows);
      for (const id of ids) {
        const deleteIds = [id, ...getDescendantIds(id)];
        state.rows = state.rows.filter(r => !deleteIds.includes(r.id));
        if (state.isOnline) for (const d of deleteIds) await sb.from('rows').delete().eq('id', d);
      }
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      state.selectedRows.clear();
      render();
      toast('批量删除完成');
    }
    
    async function batchClear() {
      const ids = Array.from(state.selectedRows);
      for (const id of ids) {
        const r = state.rows.find(x => x.id === id);
        if (r) { r.cells = {}; r.updated_at = now(); saveRowDebounced(r); }

    // ==================== FILTERING LOGIC ====================
    function getFilteredRows() {
      let rows = [...state.rows];
      if (state.readOnly) rows = rows.filter(r => r.visibility !== 'private');
      
      // Apply filters
      if (state.filters.length) {
        rows = rows.filter(r => state.filters.every(f => rowMatchesFilter(r, f)));
      }
      
      // Apply search
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        rows = rows.filter(r => {
          if (r.id?.toLowerCase().includes(q)) return true;
          for (const [k,v] of Object.entries(r.cells||{})) {
            if (String(v).toLowerCase().includes(q)) return true;
          }
          return false;
        });
      }
      
      return rows;
    }
    
    function rowMatchesFilter(r, f) {
      if (!f.column) return true;
      const val = r.cells?.[f.column];
      if (f.op === 'empty') return !val || (Array.isArray(val) && val.length === 0);
      if (!f.value) return true;
      if (f.op === 'equals') return String(val).toLowerCase() === f.value.toLowerCase();
      if (f.op === 'contains') return String(val).toLowerCase().includes(f.value.toLowerCase());
      return true;
    }
    
    // ==================== UI HELPERS ====================
    function escapeHtml(t) {
      if (!t) return '';
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatTimeAgo(d) {
      if (!d) return '';
      const diff = Date.now() - new Date(d).getTime();
      const m = Math.floor(diff/60000);
      if (m < 1) return '刚刚';
      if (m < 60) return m + '分钟前';
      const h = Math.floor(m/60);
      if (h < 24) return h + '小时前';
      return Math.floor(h/24) + '天前';
    }

      r.cells = {...r.cells, [colId]: tags};
      r.updated_at = now();
      saveLocal('rows_'+state.currentBoard.id, state.rows);
      saveRowDebounced(r);
      document.getElementById('activePicker')?.remove();

        col.options.push({value: val, color: COLORS[col.options.length % COLORS.length]});
        state.currentBoard.columns = state.columns;
        saveBoardDebounced(state.currentBoard);
      }
      toggleTag(rowId, colId, val);

    // ==================== EXPORT ====================
    function exportCSV() {
      const rows = getFilteredRows();
      const headers = ['完成', ...state.columns.map(c => c.name)];
      const lines = [headers.join(',')];
      
      function getCellVal(r, c) {
        const v = r.cells?.[c.id];
        if (c.type === 'select') return Array.isArray(v) ? v.join(';') : (v||'');
        if (c.type === 'url') {
          const urls = Array.isArray(v) ? v : (v ? [{href:v}] : []);
          return urls.map(u => u.href).join(';');
        }
        return v || '';
      }
      
      for (const r of rows) {
        const line = [r.done?'完成':'未完成', ...state.columns.map(c => `"${getCellVal(r,c).toString().replace(/"/g,'""')}"`)];
        lines.push(line.join(','));
      }
      
      const blob = new Blob(['\ufeff'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (state.currentBoard?.title||'export') + '.csv';
      a.click();
      toast('CSV已导出');
    }

    // ==================== DRAG & DROP ====================
    function initRowDrag() {
      const tbody = document.querySelector('tbody');
      if (!tbody) return;
      let dragSrc = null;
      
      tbody.querySelectorAll('tr').forEach(tr => {
        tr.draggable = true;
        const handle = tr.querySelector('.row-handle');
        if (handle) handle.draggable = true;
        
        tr.addEventListener('dragstart', e => {
          dragSrc = tr;
          tr.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        
        tr.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        });
        
        tr.addEventListener('drop', e => {
          e.preventDefault();
          if (!dragSrc || dragSrc === tr) return;
          const srcId = dragSrc.dataset.id;
          const tgtId = tr.dataset.id;
          reorderRow(srcId, tgtId);
        });
        
        tr.addEventListener('dragend', () => {
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('dragging'));
        });
      });
    }
    
    function initColDrag() {
      const ths = document.querySelectorAll('th[draggable]');
      let dragIdx = null;
      
      ths.forEach((th, i) => {
        th.addEventListener('dragstart', e => {
          dragIdx = parseInt(th.dataset.colIdx);
          th.style.opacity = '0.5';
        });
        th.addEventListener('dragover', e => e.preventDefault());
        th.addEventListener('drop', e => {
          e.preventDefault();
          const targetIdx = parseInt(th.dataset.colIdx);
          if (dragIdx !== null && dragIdx !== targetIdx) {
            reorderColumn(dragIdx, targetIdx);
          }
        });
        th.addEventListener('dragend', () => {
          th.style.opacity = '1';
        });
      });
    }
    
    function reorderRow(srcId, tgtId) {
      const rows = [...state.rows];
      const srcIdx = rows.findIndex(r => r.id === srcId);
      const tgtIdx = rows.findIndex(r => r.id === tgtId);
      if (srcIdx < 0 || tgtIdx < 0) return;
      
      const [moved] = rows.splice(srcIdx, 1);
      rows.splice(tgtIdx, 0, moved);
      
      // Update positions
      rows.forEach((r, i) => { r.position = i; saveRowDebounced(r); });
      state.rows = rows;
      saveLocal('rows_'+state.currentBoard.id, rows);
      render();
    }
    
    function reorderColumn(from, to) {
      const cols = [...state.columns];
      const [moved] = cols.splice(from, 1);
      cols.splice(to, 0, moved);
      state.columns = cols;
      state.currentBoard.columns = cols;
      saveBoardDebounced(state.currentBoard);
      render();
    }

      document.querySelector('.bottom-sheet-overlay')?.remove();
      document.querySelector('.bottom-sheet')?.remove();
    }
    
    // ==================== INITIALIZATION ====================
    window.addEventListener('online', () => { state.isOnline = true; state.syncStatus = 'ok'; loadBoards(); });
    window.addEventListener('offline', () => { state.isOnline = false; state.syncStatus = 'offline'; });
    
    document.addEventListener('DOMContentLoaded', () => {
      loadBoards();
      route();
    });
  </script>
</body>
</html>
