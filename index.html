/* ═══ FEATURE 1: Deadline countdown display ═══ */
function dateDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function renderDeadlineBadge(dateStr) {
  const diff = dateDiff(dateStr);
  if (diff === null) return '';
  if (diff < 0) return `<span class="cell-date-badge" style="background:#fff0f0;color:#e35454">已逾期 ${Math.abs(diff)}d</span>`;
  if (diff === 0) return `<span class="cell-date-badge" style="background:#fff3e0;color:#f57c00">今天截止</span>`;
  if (diff <= 3) return `<span class="cell-date-badge" style="background:#fffde7;color:#f9a825">还剩 ${diff}d</span>`;
  if (diff <= 7) return `<span class="cell-date-badge" style="background:#e8f4fd;color:#1976d2">还剩 ${diff}d</span>`;
  return '';
}

/* ═══ FEATURE 2: Kanban view ═══ */
let kanbanMode = false;
function toggleKanban() {
  kanbanMode = !kanbanMode;
  document.getElementById('kanbanBtn').classList.toggle('active', kanbanMode);
  document.querySelector('.wrapper').style.display = kanbanMode ? 'none' : '';
  document.getElementById('mobileView').style.display = kanbanMode ? 'none' : '';
  document.getElementById('kanbanView').style.display = kanbanMode ? 'block' : 'none';
  document.getElementById('statsBar').style.display = kanbanMode ? 'none' : '';
  if (kanbanMode) renderKanban();
}
function getKanbanGroupCol() {
  // Prefer "距离截止日" or "状态" column
  const statusCol = S.columns.find(c => c.label === '距离截止日' || c.label === '状态');
  if (statusCol) return statusCol;
  // Fallback to first select column
  return S.columns.find(c => c.type === 'select');
}
function renderKanban() {
  const col = getKanbanGroupCol();
  const container = document.getElementById('kanbanContainer');
  if (!col || !container) return;
  
  const options = col.options || [];
  const rowsByStatus = {};
  const noStatusRows = [];
  
  // Filter and group rows
  const visibleRows = S.rows.filter(r => {
    if (!r.p && !rowPassesFilters(r)) return false;
    if (!r.p && !rowMatchesSearch(r)) return false;
    return true;
  });
  
  visibleRows.forEach(r => {
    if (r.p) return; // Only top-level in kanban
    const vals = r.cells[col.id] || [];
    if (!vals.length) {
      noStatusRows.push(r);
      return;
    }
    vals.forEach(vid => {
      if (!rowsByStatus[vid]) rowsByStatus[vid] = [];
      rowsByStatus[vid].push(r);
    });
  });
  
  let html = '';
  
  // Create column for each option
  options.forEach(opt => {
    const rows = rowsByStatus[opt.id] || [];
    html += renderKanbanColumn(opt.label, rows, opt.id, col);
  });
  
  // "No status" column
  if (noStatusRows.length) {
    html += renderKanbanColumn('无状态', noStatusRows, null, col);
  }
  
  container.innerHTML = html;
}
function renderKanbanColumn(title, rows, optId, groupCol) {
  const count = rows.length;
  const done = rows.filter(r => r.done).length;
  
  let cardsHtml = '';
  rows.forEach(row => {
    cardsHtml += renderKanbanCard(row, groupCol);
  });
  
  return `<div class="kb-col">
    <div class="kb-col-header">
      <span class="kb-col-title">${esc(title)}</span>
      <span class="kb-col-count">${count}</span>
    </div>
    <div class="kb-cards" data-status="${optId || 'none'}">
      ${cardsHtml}
    </div>
    <button class="kb-add-btn" onclick="addRowWithStatus('${optId || ''}', '${groupCol.id}')">+ 添加</button>
  </div>`;
}
function renderKanbanCard(row, groupCol) {
  const title = row.cells[S.columns[0].id] || '（无标题）';
  
  // Get tags from other select columns
  let tagsHtml = '';
  S.columns.forEach(c => {
    if (c.id === groupCol.id || c.type !== 'select') return;
    const vals = row.cells[c.id] || [];
    vals.forEach(vid => {
      const opt = (c.options || []).find(o => o.id === vid);
      if (opt) {
        const color = TAG_COLORS[opt.colorIdx % TAG_COLORS.length];
        tagsHtml += `<span class="tag-pill" style="background:${color.bg};color:${color.fg};font-size:11px;padding:1px 6px">${esc(opt.label)}</span>`;
      }
    });
  });
  
  // Find date column for due date
  const dateCol = S.columns.find(c => c.type === 'date');
  let dateHtml = '';
  if (dateCol && row.cells[dateCol.id]) {
    const dateVal = row.cells[dateCol.id];
    const badge = renderDeadlineBadge(dateVal);
    dateHtml = `<div class="kb-card-date">📅 ${esc(dateVal)} ${badge}</div>`;
  }
  
  return `<div class="kb-card" onclick="editRowInline('${row.id}')">
    <div class="kb-card-title">${esc(title)}</div>
    ${tagsHtml ? `<div class="kb-card-tags">${tagsHtml}</div>` : ''}
    ${dateHtml}
  </div>`;
}
function addRowWithStatus(statusVal, colId) {
  addRow();
  setTimeout(() => {
    const newRows = S.rows.filter(r => !r.p);
    const newRow = newRows[newRows.length - 1];
    if (newRow && statusVal) {
      newRow.cells[colId] = [statusVal];
      save(); renderKanban();
    }
  }, 50);
}
function editRowInline(rowId) {
  // Switch to table view and start editing
  if (kanbanMode) toggleKanban();
  setTimeout(() => {
    const el = document.querySelector(`tr[data-row="${rowId}"] .cell-text-wrap`);
    if (el) el.click();
  }, 50);
}

/* ═══ FEATURE 4: Completion confetti animation ═══ */
function confetti(x, y) {
  const colors = ['#4caf82','#ff9800','#2196f3','#e91e63','#9c27b0','#ffeb3b','#00bcd4','#ff5722','#8bc34a','#ff4081'];

  // 🎊 Phase 1: big burst from click point — 40 particles
  for (let i = 0; i < 40; i++) {
    const size = 6 + Math.random() * 10;
    const el = document.createElement('div');
    const isRect = Math.random() > 0.4;
    el.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${isRect ? size*0.4 : size}px;border-radius:${isRect?'2px':'50%'};background:${colors[Math.floor(Math.random()*colors.length)]};pointer-events:none;z-index:9999;transition:transform .9s cubic-bezier(.15,.5,.4,1),opacity .9s ease`;
    document.body.appendChild(el);
    const angle = Math.random() * 360;
    const dist = 80 + Math.random() * 180;
    const rad = angle * Math.PI / 180;
    const dx = Math.cos(rad) * dist;
    const dy = Math.sin(rad) * dist - (60 + Math.random() * 80); // bias upward
    setTimeout(() => {
      el.style.transform = `translate(${dx}px,${dy}px) rotate(${Math.random()*720}deg)`;
      el.style.opacity = '0';
    }, 10);
    setTimeout(() => el.remove(), 1000);
  }

  // 🎉 Phase 2: rain from top — 30 particles cascade down
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const size = 5 + Math.random() * 9;
      const el = document.createElement('div');
      const startX = Math.random() * window.innerWidth;

══════════════════════════════════════ */
let _colResizing = null;
function startColResize(e, colId) {
  e.preventDefault(); e.stopPropagation();
  const col = S.columns.find(c => c.id === colId);
  if (!col) return;
  const startX = e.clientX;
  const startW = col.width || 140;
  _colResizing = colId;
  document.body.classList.add('resizing-col');
  e.target.classList.add('active');
  const onMove = ev => {
    const newW = Math.max(60, startW + ev.clientX - startX);
    col.width = newW;
    const th = document.querySelector(`th[data-col="${colId}"]`);
    if (th) { th.style.minWidth = newW+'px'; th.style.width = newW+'px'; }
    // also update all tds in this column live
    document.querySelectorAll(`td[data-col="${colId}"]`).forEach(td => {
      td.style.minWidth = newW+'px'; td.style.maxWidth = newW+'px';
    });
  };
  const onUp = () => {
    document.body.classList.remove('resizing-col');
    e.target.classList.remove('active');
    _colResizing = null;
    save();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ══════════════════════════════════════
   ROW HEIGHT RESIZE (drag bottom edge)
══════════════════════════════════════ */
let _rowResizing = null;
function startRowResize(e, rowId) {
  e.preventDefault(); e.stopPropagation();
  const row = S.rows.find(r => r.id === rowId);
  if (!row) return;
  const tr = document.querySelector(`tr[data-row="${rowId}"]`);
  const startY = e.clientY;
  const startH = tr ? tr.getBoundingClientRect().height : (row.h || 40);
  _rowResizing = rowId;
  document.body.classList.add('resizing-row');
  e.target.classList.add('active');
  const onMove = ev => {
    const newH = Math.max(36, startH + ev.clientY - startY);
    row.h = newH;
    if (tr) tr.style.height = newH + 'px';
  };
  const onUp = () => {
    document.body.classList.remove('resizing-row');
    e.target.classList.remove('active');
    _rowResizing = null;
    save();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function renderCalendar() {
  const dateCol = S.columns.find(c => c.type === 'date');
  const today = new Date();
  const year = calendarYear, month = calendarMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const byDate = {};
  S.rows.filter(r => !r.p).forEach(r => {
    if (!dateCol) return;
    const d = r.cells[dateCol.id];
    if (d) byDate[d] = (byDate[d] || []).concat(r);
  });
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  let h = `<div class="cal-header">
    <button class="tb-btn" onclick="calPrev()">‹</button>
    <span class="cal-title">${year}年 ${monthNames[month]}</span>
    <button class="tb-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
    <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>`;
  for (let i = 0; i < firstDay; i++) h += `<div class="cal-cell cal-empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const rows = byDate[dateStr] || [];
    h += `<div class="cal-cell ${isToday?'cal-today':''}">
      <div class="cal-day-num">${d}</div>`;
    rows.slice(0,3).forEach(r => {
      const title = r.cells[S.columns[0]?.id] || '无标题';
      h += `<div class="cal-chip ${r.done?'cal-chip-done':''}" onclick="focusRow('${r.id}')" title="${title}">${title.slice(0,10)}</div>`;
    });
    if (rows.length > 3) h += `<div class="cal-more">+${rows.length-3}</div>`;
    h += `</div>`;
  }
  h += `</div>`;
  document.getElementById('calendarView').innerHTML = h;
}

      ${bars}
    </div>`;
  }
  
  document.getElementById('homeCalGrid').innerHTML = h;
}

/* ── 获取某天所有待办 ── */
function getTodosForDate(dateStr) {
  const todos = [];
  homeBoards.forEach(board => {
    const dateCol = board.columns?.find(c => c.type === 'date');
    if (!dateCol) return;
    const data = JSON.parse(localStorage.getItem(STORE_PREFIX + board.id) || 'null');
    if (data?.rows) {
      data.rows.forEach(row => {
        if (row.cells?.[dateCol.id] === dateStr) {
          todos.push({ board: board.title, boardId: board.id, title: row.cells?.[board.columns[0]?.id] || '无标题', done: row.done });
        }
      });
    }
  });
  return todos;
}

/* ─── Feature 2: Recurring Tasks ─── */
function createNextRecurrence(row) {
  const dateCol = S.columns.find(c => c.type === 'date');
  if (!dateCol || !row.cells[dateCol.id]) return;
  const d = new Date(row.cells[dateCol.id]);
  switch(row.recurring) {
    case 'daily': d.setDate(d.getDate() + 1); break;
    case 'weekly': d.setDate(d.getDate() + 7); break;
    case 'biweekly': d.setDate(d.getDate() + 14); break;
    case 'monthly': d.setMonth(d.getMonth() + 1); break;
    default: return;
  }
  S.rows.push({
    id:gid(), p:row.p, done:false, cells:{...row.cells,[dateCol.id]:d.toISOString().split('T')[0]}, pos:row.pos+0.5, recurring:row.recurring
  });
  save(); renderTable(); toast('🔁 已创建下次重复任务');
}

function setRecurring(rowId) {
  const row = S.rows.find(r => r.id === rowId);
  if (!row) return;
  const opts = [{v:'',l:'✕ 不重复'},{v:'daily',l:'📅 每天'},{v:'weekly',l:'📅 每周'},{v:'biweekly',l:'📅 每两周'},{v:'monthly',l:'📅 每月'}];
  document.getElementById('recurPop')?.remove();
  const pop = document.createElement('div');
  pop.id = 'recurPop'; pop.className = 'popover';
  pop.style.cssText = 'position:fixed;z-index:3000;min-width:140px';
  pop.innerHTML = opts.map(o=>`<div class="pop-item ${row.recurring===o.v?'pop-item-active':''}" onclick="applyRecurring('${rowId}','${o.v}')">${o.l}</div>`).join('');
  document.body.appendChild(pop);
  const rect = event.target.closest('.row-act').getBoundingClientRect();
  pop.style.top=(rect.bottom+4)+'px'; pop.style.left=rect.left+'px';
  setTimeout(()=>document.addEventListener('click',function h(){pop.remove();document.removeEventListener('click',h);},{once:true}),10);
}

function applyRecurring(rowId, val) {
  const row = S.rows.find(r=>r.id===rowId);
  if (row) { row.recurring = val||undefined; save(); renderTable(); }
  const labels={daily:'每天',weekly:'每周',biweekly:'每两周',monthly:'每月'};
  if(val) toast('🔁 重复：'+labels[val]);
  document.getElementById('recurPop')?.remove();
}

/* ─── Feature 3: Reminders ─── */
setInterval(function checkReminders() {
  if (!S || !S.rows) return;
  const now = new Date();
  S.rows.forEach(row => {
    if (!row.reminder || row.done || row.reminderFired) return;
    if (now >= new Date(row.reminder)) {
      row.reminderFired = true;
      const title = row.cells[S.columns[0]?.id] || '任务';
      if (Notification?.permission === 'granted') new Notification('⏰ 任务提醒', {body: title});
      toast('⏰ 提醒：'+title);
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#ff9800;color:#fff;padding:12px 20px;border-radius:10px;z-index:9999;font-weight:600;box-shadow:0 4px 20px rgba(255,152,0,.4);cursor:pointer;max-width:80vw;text-align:center';
      banner.textContent = '⏰ '+title+' — 点击查看';
      banner.onclick = () => { banner.remove(); focusRow(row.id); };
      document.body.appendChild(banner);
      setTimeout(()=>banner.remove(), 10000);
      save();
    }
  });
}, 60000);

/* ─── Feature 4: Stats Panel ─── */
function toggleStatsPanel() {
  const panel = document.getElementById('statsPanel');
  if (!panel) return;
  const showing = panel.style.display !== 'none';
  panel.style.display = showing ? 'none' : 'block';
  if (!showing) renderStatsPanel();
}

function renderStatsPanel() {
  const panel = document.getElementById('statsPanel');
  if (!panel) return;
  const allRows = S.rows.filter(r => !r.p);
  const total = allRows.length;
  const done = allRows.filter(r => r.done).length;
  const pending = total - done;
  const today = new Date().toISOString().split('T')[0];
  const dateCol = S.columns.find(c => c.type === 'date');
  const overdue = allRows.filter(r => !r.done && dateCol && r.cells[dateCol.id] && r.cells[dateCol.id] < today).length;
  const rate = total ? Math.round(done/total*100) : 0;

  const doneDates = {};
  allRows.filter(r => r.done && r.doneDate).forEach(r => { doneDates[r.doneDate] = (doneDates[r.doneDate]||0)+1; });
  const maxVal = Math.max(1, ...Object.values(doneDates).concat([0]));
  let heatmapHtml = '<div class="heat-grid">';
  for (let i = 90; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    const cnt = doneDates[ds]||0;
    const intensity = cnt===0?0:Math.min(4,Math.ceil(cnt/maxVal*4));
    heatmapHtml += `<div class="heat-cell heat-${intensity}" title="${ds}: ${cnt}个完成"></div>`;
  }
  heatmapHtml += '</div>';

  const tagCol = S.columns.find(c => c.type==='select'||c.type==='multiselect');
  let tagBreakdown = '';
  if (tagCol?.options) {
    const counts = {};
    allRows.forEach(r => { const v=r.cells[tagCol.id]; if(v)(Array.isArray(v)?v:[v]).forEach(t=>{counts[t]=(counts[t]||0)+1;}); });
    const maxCnt = Math.max(1,...Object.values(counts).concat([0]));
    if (Object.keys(counts).length) tagBreakdown = `<div class="stats-sec-title">${tagCol.label} 分布</div><div class="stats-bars">`+
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="stats-bar-row"><span class="stats-bar-lbl">${k}</span><div class="stats-bar-track"><div class="stats-bar-fill" style="width:${(v/maxCnt*100).toFixed(0)}%"></div></div><span class="stats-bar-cnt">${v}</span></div>`).join('')+'</div>';
  }

  panel.innerHTML = `<div class="stats-panel-inner">
    <div class="stats-panel-hdr"><span>📊 数据统计</span><button onclick="toggleStatsPanel()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1">✕</button></div>
    <div class="stats-summary">
      <div class="stats-card"><div class="stats-num">${total}</div><div class="stats-lbl">总任务</div></div>
      <div class="stats-card" style="background:#edf7f2"><div class="stats-num" style="color:#2d9e6b">${done}</div><div class="stats-lbl">已完成</div></div>
      <div class="stats-card" style="background:#fff8e6"><div class="stats-num" style="color:#ff9800">${pending}</div><div class="stats-lbl">进行中</div></div>
      <div class="stats-card" style="background:#fff0f0"><div class="stats-num" style="color:#f44336">${overdue}</div><div class="stats-lbl">已逾期</div></div>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="40" cy="40" r="32" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="${rate*2.01} 201" stroke-dashoffset="50.25" stroke-linecap="round"/>
        <text x="40" y="45" text-anchor="middle" font-size="16" font-weight="800" fill="var(--text)">${rate}%</text>
      </svg>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">完成率</div>
    </div>
    <div class="stats-sec-title">完成热力图 <span style="font-size:11px;font-weight:400;color:var(--text3)">近90天</span></div>
    ${heatmapHtml}
    ${tagBreakdown}
  </div>`;
}

  if(t.includes('项目')||t.includes('开发')||t.includes('功能')) return ['📐 需求分析和设计','🔧 搭建基础架构','💻 核心功能开发','🧪 测试和调试','🚀 部署和上线'];

function confirmDecompose(rowId) {
  const modal=document.getElementById('decomposeModal');
  if(!modal) return;

  if(!row) return;
  const cbs=modal.querySelectorAll('input[type=checkbox]');
  const txts=modal.querySelectorAll('input[type=text]');
  let added=0;
  cbs.forEach((cb,i)=>{ if(cb.checked&&txts[i]?.value.trim()){ S.rows.push({id:gid(),p:rowId,done:false,cells:{[S.columns[0]?.id]:txts[i].value},pos:Date.now()+i}); added++; } });
  modal.remove();
  if(added>0){save();renderTable();toast(`🤖 已添加 ${added} 个子任务`);}
}

/* ─── Feature 6: Timeline/Gantt ─── */
let timelineView = false;
function toggleTimeline() {
  timelineView = !timelineView;
  const view = document.getElementById('timelineView');
  if (timelineView) {
    document.querySelector('.wrapper').style.display='none';
    document.getElementById('mobileView').style.display='none';
    document.getElementById('kanbanView').style.display='none';
    kanbanMode = false; document.getElementById('kanbanBtn').classList.remove('active');
    calendarView = false; document.getElementById('calendarView').style.display='none';
    document.getElementById('calBtn')?.classList.remove('active');
    matrixView = false; document.getElementById('matrixView').style.display='none';
    document.getElementById('mtxBtn')?.classList.remove('active');
    view.style.display='block';
    document.getElementById('tlBtn')?.classList.add('active');
    renderTimeline();
  } else {
    view.style.display='none';
    document.querySelector('.wrapper').style.display='';
    document.getElementById('mobileView').style.display='';
    document.getElementById('tlBtn')?.classList.remove('active');
  }
}

function renderTimeline() {
  const view=document.getElementById('timelineView');
  const dateCol=S.columns.find(c=>c.type==='date');
  if(!dateCol){view.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">请先添加一个日期类型的列</div>';return;}
  const today=new Date();today.setHours(0,0,0,0);
  const days=30;
  const rows=S.rows.filter(r=>!r.p&&r.cells[dateCol.id]).sort((a,b)=>(a.cells[dateCol.id]||'').localeCompare(b.cells[dateCol.id]||''));
  if(!rows.length){view.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">没有带截止日期的任务</div>';return;}
  let labelHtml='<div class="tl-labels"><div class="tl-lbl-hdr">任务</div>';
  rows.forEach(r=>{const t=(r.cells[S.columns[0]?.id]||'').slice(0,14);labelHtml+=`<div class="tl-lbl ${r.done?'tl-done':''}">${t}</div>`;});
  labelHtml+='</div>';
  let dateHtml='<div class="tl-dates">';
  for(let i=0;i<days;i++){const d=new Date(today);d.setDate(d.getDate()+i);const isWE=d.getDay()===0||d.getDay()===6;dateHtml+=`<div class="tl-date-cell ${isWE?'tl-weekend':''} ${i===0?'tl-today-col':''}">${d.getDate()}<br><span style="font-size:9px">${['日','一','二','三','四','五','六'][d.getDay()]}</span></div>`;}
  dateHtml+='</div>';
  let rowsHtml='';
  rows.forEach(r=>{
    const deadline=new Date(r.cells[dateCol.id]);
    const endDay=Math.min(days-1,Math.max(0,Math.ceil((deadline-today)/86400000)));
    const overdue=deadline<today;
    rowsHtml+=`<div class="tl-row-cells ${overdue?'tl-overdue':''} ${r.done?'tl-done-row':''}">`;
    for(let i=0;i<days;i++){const inRange=i<=endDay;const isEnd=i===endDay;rowsHtml+=`<div class="tl-cell ${inRange?'tl-bar':''} ${isEnd?'tl-bar-end':''}"></div>`;}
    rowsHtml+='</div>';
  });
  view.innerHTML=`<div style="padding:12px 16px;font-size:15px;font-weight:700;color:var(--text)">🗓️ 时间轴 <span style="font-size:12px;font-weight:400;color:var(--text3)">未来30天</span></div><div class="tl-wrap">${labelHtml}<div class="tl-grid-wrap">${dateHtml}${rowsHtml}</div></div>`;
}

/* ─── Feature 7: Priority Matrix ─── */
let matrixView = false;
function toggleMatrix() {
  matrixView = !matrixView;
  const view = document.getElementById('matrixView');
  if (matrixView) {
    document.querySelector('.wrapper').style.display='none';
    document.getElementById('mobileView').style.display='none';
    document.getElementById('kanbanView').style.display='none';
    kanbanMode = false; document.getElementById('kanbanBtn').classList.remove('active');
    calendarView = false; document.getElementById('calendarView').style.display='none';
    document.getElementById('calBtn')?.classList.remove('active');
    timelineView = false; document.getElementById('timelineView').style.display='none';
    document.getElementById('tlBtn')?.classList.remove('active');
    view.style.display='block';
    document.getElementById('mtxBtn')?.classList.add('active');
    renderMatrix();
  } else {
    view.style.display='none';
    document.querySelector('.wrapper').style.display='';
    document.getElementById('mobileView').style.display='';
    document.getElementById('mtxBtn')?.classList.remove('active');
  }
}

function getQuadrant(row) {
  if (row.quadrant) return row.quadrant;
  const priCol=S.columns.find(c=>c.label.includes('优先')||c.label.toLowerCase().includes('priority'));
  if(priCol){const v=(row.cells[priCol.id]||'').toString().toLowerCase();if(v.includes('高')||v.includes('紧急')||v.includes('p0'))return 'q1';if(v.includes('中')||v.includes('重要')||v.includes('p1'))return 'q2';if(v.includes('低')||v.includes('p2')||v.includes('p3'))return 'q3';}
  const dateCol=S.columns.find(c=>c.type==='date');
  if(dateCol&&row.cells[dateCol.id]){const daysLeft=(new Date(row.cells[dateCol.id])-new Date())/86400000;if(daysLeft<3)return 'q1';if(daysLeft<7)return 'q2';}
  return 'q4';
}

function renderMatrix() {
  const view=document.getElementById('matrixView');
  const rows=S.rows.filter(r=>!r.p&&!r.done);
  const Q={q1:{label:'🔴 重要且紧急',rows:[],color:'#fff0f0',border:'#f44336'},q2:{label:'🟡 重要不紧急',rows:[],color:'#fff8e6',border:'#ff9800'},q3:{label:'🔵 紧急不重要',rows:[],color:'#f0f4ff',border:'#3b5bdb'},q4:{label:'⚪ 不紧急不重要',rows:[],color:'#f8f9fa',border:'#9aa0ac'}};
  rows.forEach(r=>{const q=getQuadrant(r);if(Q[q])Q[q].rows.push(r);});
  const fc=S.columns[0];
  view.innerHTML=`<div class="matrix-grid">`+Object.entries(Q).map(([qk,q])=>`<div class="matrix-quadrant" style="background:${q.color};border-color:${q.border}" ondragover="event.preventDefault()" ondrop="dropToQuadrant(event,'${qk}')"><div class="matrix-q-title" style="color:${q.border}">${q.label}</div><div class="matrix-q-count">${q.rows.length} 项</div>${q.rows.map(r=>`<div class="matrix-card" draggable="true" ondragstart="event.dataTransfer.setData('rowId','${r.id}')" onclick="toggleMatrix();setTimeout(()=>focusRow('${r.id}'),100)">${(r.cells[fc?.id]||'').slice(0,28)}</div>`).join('')}</div>`).join('')+'</div>';
}

function dropToQuadrant(e,quadrant){const rowId=e.dataTransfer.getData('rowId');const row=S.rows.find(r=>r.id===rowId);if(row){row.quadrant=quadrant;save();renderMatrix();}}
</script>
